version: "3.9"

networks:
  ai-internal:
    driver: bridge
    internal: true
  ai-services:
    driver: bridge
    internal: true
  ai-monitoring:
    driver: bridge
  ai-proxy:
    driver: bridge
  ai-egress:
    driver: bridge

x-postgres-env: &postgres-env
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "homeai_pipeline"
  POSTGRES_PASSWORD: "${N8N_DB_PASSWORD}"
  POSTGRES_DB: "homeai"

services:

  postgres:
    image: postgres:16.13
    container_name: homeai-postgres
    networks: [ai-internal]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres/rls-policies.sql:/docker-entrypoint-initdb.d/02-rls.sql
      - ./postgres/seed-data.sql:/docker-entrypoint-initdb.d/03-seed.sql
    environment:
      POSTGRES_DB: homeai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # 1GB /dev/shm: parallel-query DSM segments outgrow Docker's 64MB default
    # once work_mem is tuned up (memory settings live in postgresql.auto.conf
    # via ALTER SYSTEM, 2026-06-11).
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homeai"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4.8-alpine
    container_name: homeai-redis
    networks: [ai-internal]
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: homeai-postgres-exporter
    networks: [ai-internal, ai-monitoring]
    volumes:
      - ./monitoring/postgres-exporter-queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    command: ["--extend.query-path=/etc/postgres_exporter/queries.yaml"]
    environment:
      # De-superusered 2026-07-03: scoped read-only role (pg_monitor +
      # pg_read_all_data + BYPASSRLS so whole-table counts stay truthful).
      # Password: Vault secret/postgres-roles field metrics_exporter,
      # mirrored in .env; non-critical — a missing value only degrades
      # metrics, never boot (metabase pattern).
      DATA_SOURCE_NAME: "postgresql://metrics_exporter:${EXPORTER_DB_PASSWORD:-}@homeai-postgres:5432/homeai?sslmode=disable"
    depends_on:
      postgres: {condition: service_healthy}
    restart: unless-stopped

  # Qdrant (vector store) removed 2026-06-07 (Hermes #11): 357B of data, zero code
  # references — dead weight. Postgres tsvector+GIN covers the actual query
  # patterns. Re-add from git history if a real RAG use case appears.

  # SearXNG — self-hosted meta-search, exposed via Caddy at /search.
  # Tailscale-only (no public binding). Used as a private search engine + as a
  # search backend for Open WebUI / future research workflows.
  searxng:
    image: searxng/searxng:2026.5.10-df1f24fb7
    container_name: homeai-searxng
    networks: [ai-internal, ai-egress]
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      BASE_URL: "http://100.104.82.53/search/"
      INSTANCE_NAME: "Home AI"
    ports:
      # localhost-only: Hermes Agent search backend (2026-06-11). Publishing
      # works because searxng is also on ai-egress (non-internal).
      - "127.0.0.1:8888:8080"
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.15.6
    container_name: homeai-vault
    networks: [ai-internal, ai-services]
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:false
      - seccomp:unconfined
    command: vault server -config=/vault/config/vault.hcl
    volumes:
      - vault_data:/vault/data
      - ./security/vault-policies:/vault/policies
      - ./security/vault-config:/vault/config
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
    # localhost-only (was 8200:8200 = all interfaces; tightened 2026-06-11).
    # In-stack services reach vault via the docker network, host tools via
    # 127.0.0.1. Remote vault CLI use goes over SSH.
    ports: ["127.0.0.1:8200:8200"]
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:2.18.5
    container_name: homeai-n8n
    networks: [ai-internal, ai-services, ai-egress]
    volumes:
      - n8n_data:/home/node/.n8n
      - ./storage:/data/storage
    environment:
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_SECURE_COOKIE: "false"
      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: "postgres"
      DB_POSTGRESDB_DATABASE: "homeai"
      DB_POSTGRESDB_USER: "homeai_pipeline"
      DB_POSTGRESDB_PASSWORD: "${N8N_DB_PASSWORD}"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_N8N_TOKEN}"
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: "all"
      EXECUTIONS_DATA_SAVE_ON_ERROR: "all"
      N8N_DIAGNOSTICS_ENABLED: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: "crypto"
      # Cron expressions are authored as UTC. Without this, n8n defaults to
      # America/New_York and fires 4-5h late depending on DST. Discovered
      # 2026-05-10 — daily-digest cron `0 5,22 * * *` was firing at 02:00 UTC
      # because EDT 22:00 = UTC 02:00 next day.
      GENERIC_TIMEZONE: "UTC"
      TZ: "UTC"
      N8N_METRICS: "true"
      N8N_METRICS_PREFIX: "n8n_"
    depends_on:
      postgres: {condition: service_healthy}
    # Fallback DNS — Docker's embedded resolver (127.0.0.11) intermittently
    # times out on this container (3 network attachments). Symptom: telegram-bot-v1
    # bursts of "DNS server returned an error" on getUpdates. Added 2026-05-17.
    dns:
      - 127.0.0.11
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.30.10-rocm
    # 8g was a 12GB-3060-era CPU-spill cap. ollama is cgroup-aware: the mmap'd
    # GGUF page-cache counts against memory.current, so a 47GB 72B model saturates
    # a small limit and ollama's pre-load check fails ("model request too large,
    # requested 16.8 GiB / available 8.0"). Need room for model-file cache (~47G)
    # + working set (~17G); 80g leaves headroom on the 107GiB host. Cache is
    # reclaimable so this isn't a hard reservation. 2026-06-19.
    mem_limit: 80g
    mem_reservation: 4g
    container_name: homeai-ollama
    # ai-egress added in U66 so `ollama pull` can reach registry.ollama.ai.
    # Outbound model fetches only; existing service-to-ollama DNS unchanged.
    networks: [ai-internal, ai-egress]
    volumes: [ollama_data:/root/.ollama]
    environment:
      # 5m un-pins idle models. The 12GB-3060 spill rationale is moot on 48GB
      # (vision + 72B both fit in VRAM), but 5m is a fine default; revisit if we
      # want a 72B pinned hot. 2026-06-15, reviewed for AMD swap 2026-06-18.
      OLLAMA_KEEP_ALIVE: "5m"
      # 2026-06-25: bumped 2→4 after benchmarking the W7800. At NP=2 a 4-concurrent
      # load queued 2 requests (the "c=4 collapse" Hermes mis-diagnosed as an HBM
      # bandwidth wall); at NP=4, gemma4-qat31b aggregate scaled 24.9→48.5→66.0→77.0
      # t/s across c=1..4 with NO cliff. BUT NP is global and 4 unbounded KV slots
      # spilled the 41GB 72B q4_0 to CPU (62/81 layers). Fix = pin CONTEXT_LENGTH
      # below so 4 KV slots fit alongside big weights. Long-context callers must pass
      # options.num_ctx per request to exceed this default.
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_CONTEXT_LENGTH: "8192"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
      # 0.30.10's llama.cpp REQUIRES flash attention for KV-cache quantization
      # (q8_0); with it off, every model load crashes ("V cache quantization
      # requires flash_attn"). Was "0" on 0.22.1 where the combo was allowed.
      # flash_attn is supported on gfx1100/RDNA3 and also cuts KV memory. 2026-06-19.
      OLLAMA_FLASH_ATTENTION: "1"
    ports: ["127.0.0.1:11434:11434", "100.104.82.53:11434:11434"]
    # AMD ROCm GPU passthrough — enabled 2026-06-18 for the NVIDIA 3060 → AMD
    # 48GB Navi 31 (gfx1100, W7900-class) swap. Replaced the nvidia CDI device
    # (nvidia.com/gpu=all), which no longer exists post-swap and would crash-loop.
    # /dev/kfd = ROCm compute node, /dev/dri = render/display nodes. group_add
    # grants access to the 660 root:video / root:render device nodes (host GIDs).
    # gfx1100 is natively supported → no HSA_OVERRIDE_GFX_VERSION needed.
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"    # video  (host gid)
      - "990"   # render (host gid)
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.60.3.3
    container_name: homeai-metabase
    networks: [ai-internal]
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: "5432"
      MB_DB_DBNAME: metabase_app
      MB_DB_USER: metabase_app
      MB_DB_PASS: "${METABASE_APP_PASSWORD}"
      MB_AI_FEATURES_ENABLED: "false"
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["3000:3000"]
    restart: unless-stopped

  # Phase 2 SSO. Profile-gated so `docker compose up` won't auto-start it.
  # To bring online: fix `identity_providers: {}` in security/authelia-v2/configuration.yml
  # (Authelia 4.39 rejects an empty mapping — either drop the key entirely or
  # populate with OIDC clients), then run:
  #   docker compose --profile phase2 up -d authelia
  # Vault drift was reconciled in U33; users_database.yml has an argon2id hash
  # of the password stored at secret/authelia/admin_initial.
  authelia:
    image: authelia/authelia:4.39.19
    container_name: homeai-authelia
    networks: [ai-internal, ai-proxy]
    volumes: [./security/authelia-v2:/config]
    environment:
      TZ: "Europe/London"
    ports:
      - "100.104.82.53:9091:9091"
    profiles: ["phase2"]
    restart: unless-stopped

  caddy:
    image: caddy:2.11.2-alpine
    container_name: homeai-caddy
    networks: [ai-proxy, ai-internal]
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/tls:/etc/caddy/tls:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "100.104.82.53:80:80"
      - "100.104.82.53:443:443"
      - "100.104.82.53:5678:5678"
      - "100.104.82.53:3000:3000"
      # 8080 dropped 2026-06-09: Hermes (~/.hermes/scripts/api-dashboard.py) owns
      # host 0.0.0.0:8080, which blocked Caddy from binding the tailnet IP:8080
      # (open-webui convenience proxy) and prevented Caddy starting at all.
      # - "100.104.82.53:8080:8080"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    container_name: homeai-grafana
    # ai-proxy lets Caddy reverse-proxy us at /grafana/* on the FQDN.
    networks: [ai-monitoring, ai-proxy]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Subpath routing — Caddy strips /grafana before proxy, so internal
      # router needs to know the public URL for redirects + static assets.
      GF_SERVER_ROOT_URL: "https://jolybox.tailc27dff.ts.net/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    depends_on: [prometheus]
    # 3003 collides with homeai-frontend (Next.js); Grafana goes on 3001.
    # Phase 5 dashboard: http://localhost:3001/d/home-ai-phase5-health
    ports: ["100.104.82.53:3001:3000"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: homeai-prometheus
    networks: [ai-monitoring, ai-internal]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus-rules:/etc/prometheus/rules
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: homeai-alertmanager
    networks: [ai-monitoring, ai-internal]
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

  # U226: probe non-/metrics endpoints (ollama /api/version) via prometheus.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: homeai-blackbox-exporter
    networks: [ai-monitoring, ai-internal]
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    restart: unless-stopped

  build-dashboard:
    build: ./services/build-dashboard
    image: homeai-build-dashboard:2.0
    container_name: homeai-build-dashboard
    # ai-egress added in U60 so /api/finance/ask can reach api.anthropic.com.
    networks: [ai-internal, ai-monitoring, ai-egress]
    volumes:
      - ./services/build-dashboard/data:/app/data:ro
      - ./postgres/migrations:/home_ai/postgres/migrations:ro
      - ./backups:/home_ai/backups:ro
      - ./storage/dreaming:/home_ai/storage/dreaming:ro
      - ./storage/invoices:/home_ai/storage/invoices:ro
      # U61 — the invoice-pipeline drops attachments here; vendor_invoice_inbox
      # rows often have first_attachment_path NULL but the file is named by id.
      - ./data/invoice-pdfs:/home_ai/data/invoice-pdfs:ro
      # U61 T4 — documents upload + invoice-preview PNG cache (writable).
      - ./storage/documents:/home_ai/storage/documents:rw
      - ./storage/invoice-previews:/home_ai/storage/invoice-previews:rw
      - ./SPEC.md:/home_ai/SPEC.md:ro
      - ./AGENTS.md:/home_ai/AGENTS.md:ro
      - ./HOME-AI-STRETCH.md:/home_ai/HOME-AI-STRETCH.md:ro
      - /proc:/host/proc:ro
      # amdgpu sysfs GPU sensing (W7800) — read-only, same posture as /proc
      - /sys:/host/sys:ro
      # F4: NO docker.sock. /api/benchmark/stream now relays over HTTP from
      # homeai-model-evaluator, which runs the benchmark in its own container.
      # This web-facing container has zero Docker access.
    environment:
      PG_DSN: "postgresql://postgres:${POSTGRES_PASSWORD}@homeai-postgres:5432/homeai"
      PROM_URL: "http://homeai-prometheus:9090"
      VAULT_URL: "http://homeai-vault:8200"
      # VAULT_TOKEN lets /api/finance/ask fetch the anthropic key. Read-only
      # usage; same token bot-responder uses. (Add to your .env)
      VAULT_TOKEN: "${VAULT_TOKEN}"
      OLLAMA_URL: "http://homeai-ollama:11434"
      N8N_BASE_URL: "http://100.104.82.53:5678"
      MONTHLY_BUDGET_GBP: "15.0"
      # U52 R2 realm enforcement. 0 = dormant (every request runs as OWNER);
      # flip to 1 once Authelia (R3) is wired and sets the X-Realm header.
      REALM_ENFORCE: "1"
      # H5 Path B — RLS service-role enforcement. ROLLED OUT 2026-06-07: default
      # now 1 = shared db helpers SET LOCAL ROLE homeai_pipeline (non-superuser)
      # so realm/entity RLS policies actually enforce on helper-path queries.
      # Grant gap closed in V246; soak-tested 68/69 GET endpoints clean. Inline-
      # pool endpoints + bot-responder still connect as superuser (Phase B).
      # Instant rollback: set RLS_ENFORCE_SET_ROLE=0 in .env + recreate.
      RLS_ENFORCE_SET_ROLE: "${RLS_ENFORCE_SET_ROLE:-1}"
      # U250: breakfast-link signing secret — Vault secret/breakfast, mirrored
      # in .env for compose/cron. No fallback in code; container fails loud.
      BREAKFAST_TOKEN_SECRET: "${BREAKFAST_TOKEN_SECRET}"
    # U226: CDI device naming — see ollama service for context.
    # nvidia GPU passthrough DISABLED 2026-06-18 for the W7800 (AMD) swap (see ollama).
    # devices:
    #   - nvidia.com/gpu=all
    ports:
      - "100.104.82.53:8090:8090"
    depends_on:
      postgres: {condition: service_healthy}
    restart: unless-stopped

  netdata:
    image: netdata/netdata:v2.10.3
    mem_limit: 512m
    cpus: "1.0"
    container_name: homeai-netdata
    pid: host
    network_mode: host
    cap_add: [SYS_PTRACE]
    security_opt: [apparmor:unconfined]
    volumes:
      - ./monitoring/netdata.conf:/etc/netdata/netdata.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9.2
    container_name: homeai-open-webui
    # ai-internal is `internal: true` so port publishing is silently dropped
    # for containers attached only to it. Mirroring build-dashboard's pattern,
    # we also attach to ai-monitoring (non-internal) so the host port maps
    # onto the Tailscale interface. — discovered U8-S2 2026-05-09.
    networks: [ai-internal, ai-monitoring]
    volumes: [open_webui_data:/app/backend/data]
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      WEBUI_SECRET_KEY: "${OPEN_WEBUI_SECRET}"
      # Signup locked down post-U8-S2 (admin account exists at jolyon.sandercock@gmail.com).
      # If you ever need to add a teammate: temporarily set ENABLE_SIGNUP=true,
      # have them sign up, then revert to false. DEFAULT_USER_ROLE stays admin so
      # any future bootstrap user lands as admin.
      ENABLE_SIGNUP: "false"
      DEFAULT_USER_ROLE: "admin"
    depends_on: [ollama]
    ports:
      - "100.104.82.53:8088:8080"
    restart: unless-stopped

  pdfplumber-service:
    build: ./services/pdfplumber
    mem_limit: 1g
    container_name: homeai-pdfplumber
    # ai-monitoring (non-internal bridge) added so the 127.0.0.1 port can
    # publish — ai-internal is internal:true, which silently blocks publishing.
    networks: [ai-internal, ai-monitoring]
    ports: ["127.0.0.1:8003:8003"]  # host-local only (u276 bench/tools); services use container DNS
    restart: unless-stopped

  markitdown:
    build: ./services/markitdown
    container_name: homeai-markitdown
    networks: [ai-internal]
    ports: ["8004:8004"]
    restart: unless-stopped

  model-evaluator:
    build: ./services/model-evaluator
    container_name: homeai-model-evaluator
    networks: [ai-internal]
    environment:
      <<: *postgres-env
      OLLAMA_HOST: "http://ollama:11434"
      PAYLOAD_HMAC_KEY: "${PAYLOAD_HMAC_KEY}"
    depends_on:
      postgres: {condition: service_healthy}
      ollama:   {condition: service_started}
    # F4: no host port — reached only over ai-internal (build-dashboard relays
    # /api/benchmark/stream). Was 0.0.0.0:8008 (unauth deploy/benchmark surface).
    restart: unless-stopped

  google-fetch:
    build: ./services/google-fetch
    container_name: homeai-google-fetch
    # ai-internal for postgres + vault; ai-egress for googleapis.com.
    # NOT on ai-monitoring/ai-proxy — internal-only consumer (n8n hits it).
    networks: [ai-internal, ai-egress]
    environment:
      # De-superusered 2026-07-03: whole SQL surface (static_context SELECT,
      # events + google_api_calls INSERT, claim_idempotency_key) verified
      # granted to homeai_pipeline — the same role n8n's pipelines use.
      PG_DSN: "postgresql://homeai_pipeline:${N8N_DB_PASSWORD}@homeai-postgres:5432/homeai"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
    depends_on:
      postgres: {condition: service_healthy}
    restart: unless-stopped

  llm-router:
    build: ./services/llm-router
    container_name: homeai-llm-router
    networks: [ai-internal, ai-egress]
    volumes:
      # U140 pilot: read secrets from Vault Agent-rendered files instead of env.
      - homeai_secrets:/run/secrets:ro
    environment:
      <<: *postgres-env
      OLLAMA_HOST: "http://ollama:11434"
      # *_FILE swarm-compat convention. llm-router's secret_loader reads file.
      ANTHROPIC_API_KEY_FILE: "/run/secrets/anthropic-api-key"
      # Fall-backs for transitional period — read directly from env if file missing.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_SERVICES_TOKEN}"
      REDIS_HOST: "redis"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      PAYLOAD_HMAC_KEY: "${PAYLOAD_HMAC_KEY}"
      # Hard runaway budget cap (Hermes #4). Above the £3/day soft cap; only trips
      # on a genuine runaway. Cloud calls refused over this; escalations keep local.
      HARD_DAILY_CAP_GBP: "${HARD_DAILY_CAP_GBP:-6.0}"
    depends_on:
      postgres: {condition: service_healthy}
      ollama:   {condition: service_started}
      homeai-vault-agent: {condition: service_started}
      redis:    {condition: service_started}
    ports: ["100.104.82.53:8001:8001"]
    restart: unless-stopped

  homeai-presidio:
    build: ./services/homeai-presidio
    image: homeai-presidio:1.0
    mem_limit: 2g
    container_name: homeai-presidio
    networks: [ai-internal]
    environment:
      <<: *postgres-env
    depends_on:
      postgres: {condition: service_healthy}
    # No published ports: only callers on ai-internal reach it via DNS
    # (homeai-presidio:8765). Avoids the 8765 collision with homeai-mcp.
    restart: unless-stopped

  # U142 — LiteLLM gateway. Single instance for now; primary/secondary pair
  # behind Caddy is a follow-up. All cloud-bound LLM calls SHOULD go through
  # this proxy so Presidio redaction + ai_usage logging happen in one place.
  # Workflows hit /v1/chat/completions with model="cap_<capability>".
  homeai-litellm:
    build: ./services/homeai-litellm
    container_name: homeai-litellm
    networks: [ai-internal, ai-egress]
    # loopback-only publish for host-side Hermes (repointed off api.deepseek.com
    # so its egress gets Presidio redaction + ai_usage logging). Not tailnet-bound,
    # so immune to the docker/tailscale boot race.
    ports:
      - "127.0.0.1:8771:4000"
    volumes:
      - homeai_secrets:/run/secrets:ro
    environment:
      <<: *postgres-env
      ANTHROPIC_API_KEY_FILE: "/run/secrets/anthropic-api-key"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-homeai-internal}"
      PRESIDIO_URL: "http://homeai-presidio:8765"
      PRESIDIO_REQUIRED: "1"
    depends_on:
      postgres: {condition: service_healthy}
      homeai-presidio:    {condition: service_started}
      homeai-vault-agent: {condition: service_started}
    restart: unless-stopped

  # U140 — Vault Agent: AppRole auto-auth, renders /run/secrets/* via
  # templates into a tmpfs volume shared with consumer services. Consumers
  # read secrets from files via *_FILE env-var convention.
  homeai-vault-agent:
    build: ./services/homeai-vault-agent
    container_name: homeai-vault-agent
    networks: [ai-internal, ai-services]
    volumes:
      - ./services/homeai-vault-agent/secrets/role_id:/etc/vault-agent/role_id:ro
      - ./services/homeai-vault-agent/secrets/secret_id:/etc/vault-agent/secret_id:ro
      - homeai_secrets:/run/secrets
    depends_on:
      - vault
    restart: unless-stopped

  # homeai-playwright — browser-scraping service (U27 P5/P6).
  # ai-internal for vault; ai-egress for touchoffice.net + app.caterbook.net.
  # n8n hits the scrape endpoints via HTTP Request node on ai-internal.
  playwright-service:
    build: ./services/playwright
    container_name: homeai-playwright
    # tini as PID 1 reaps exited headless_shell (Chrome) children. Without it,
    # PID 1 (uvicorn) never waitpid()s them → 14k+ defunct zombies accrued by
    # 2026-06-15. Takes effect on recreate.
    init: true
    networks: [ai-internal, ai-egress]
    # U229/U230 pair.sh: VNC server on 5900 for interactive auth pairing
    # when working remotely. Bound to 127.0.0.1 only.
    ports:
      - "127.0.0.1:5900:5900"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      PG_DSN: "postgresql://postgres:${POSTGRES_PASSWORD}@homeai-postgres:5432/homeai"
      # When running pair on the local console, the user passes
      # `-e DISPLAY=:0` to docker exec to skip xvfb and render on the host's
      # X server. Empty default means the in-container xvfb path is used.
      DISPLAY: ""
    volumes:
      # Debug dumps land here so they're accessible from the host without
      # docker cp. Path on host matches path in container for log clarity.
      - /home_ai/storage/scraper-debug:/host-tmp
      # U33 data-lane router writes inbound attachments (NatWest CSVs,
      # vendor PDFs, unknown-sender files) under /home_ai/data.
      - /home_ai/data:/home_ai/data
      # Host X11 socket — lets pair sessions render on the JolyBox console
      # when DISPLAY=:0 is passed to docker exec. No effect for headless runs.
      - /tmp/.X11-unix:/tmp/.X11-unix
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # homeai-bot-responder — U33 autonomous query responder.
  # Long-running idle container; host cron invokes responder.py every 5 min.
  # ai-internal: vault, postgres, google-fetch.
  # ai-egress:  api.anthropic.com, api.telegram.org.
  homeai-data-proxy:
    build: ./services/homeai-data-proxy
    container_name: homeai-data-proxy
    networks: [ai-internal, ai-egress]
    ports: ["100.104.82.53:8771:8771"]
    environment:
      PG_DSN: "postgresql://homeai_readonly:${HOMEAI_READONLY_PASSWORD}@homeai-postgres:5432/homeai"
      HOMEAI_DATA_TOKEN: "${HOMEAI_DATA_TOKEN}"
    restart: unless-stopped

  homeai-frontend:
    build:
      context: ./services/homeai-frontend
      args:
        NEXT_PUBLIC_BASE_PATH: "/app"
    container_name: homeai-frontend
    networks: [ai-internal, ai-egress]
    # No host port: Caddy reaches this over ai-internal (reverse_proxy
    # homeai-frontend:3000) behind Authelia forward_auth. Publishing :3003 was
    # the "IP backdoor" that bypassed forward_auth and let Remote-Groups be
    # spoofed for owner-realm access (Codex 2026-06-07 HIGH). Removed.
    volumes:
      # Snag screenshots used to live in /tmp/snags INSIDE the container —
      # wiped on every recreate/reboot (all pre-2026-06-11 snag images lost).
      - ./storage/snags:/data/snags

    environment:
      POSTGRES_READONLY_URL: "postgresql://homeai_readonly:${HOMEAI_READONLY_PASSWORD}@homeai-postgres:5432/homeai"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: "production"
      NEXT_PUBLIC_BASE_PATH: "/app"
    restart: unless-stopped

  wa-bridge:
    build: ./services/wa-bridge
    container_name: homeai-wa-bridge
    networks: [ai-internal, ai-egress]
    ports: ["127.0.0.1:8770:8770", "100.104.82.53:8770:8770"]
    volumes:
      - /home_ai/data/wa-profiles:/wa-profiles
    environment:
      PG_DSN: "postgresql://postgres:${POSTGRES_PASSWORD}@homeai-postgres:5432/homeai"
      WA_PROFILE_DIR: "/wa-profiles"
      WA_SEND_GAP_S: "6"
      WA_HOURLY_CAP: "30"
    restart: unless-stopped

  homeai-mcp:
    build: ./services/homeai-mcp
    container_name: homeai-mcp
    networks: [ai-internal, ai-egress]
    ports: ["100.104.82.53:8765:8765"]
    environment:
      PG_DSN: "postgresql://homeai_readonly:${HOMEAI_READONLY_PASSWORD:-}@homeai-postgres:5432/homeai"
      MCP_TRANSPORT: "sse"
      HOMEAI_MCP_REALM: "owner"
      HOMEAI_MCP_TOKEN: "${HOMEAI_MCP_TOKEN:-}"
    restart: unless-stopped

  bot-responder:
    build: ./services/bot-responder
    container_name: homeai-bot-responder
    networks: [ai-internal, ai-egress]
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      BOT_RESPONDER_MODEL: "${BOT_RESPONDER_MODEL:-claude-haiku-4-5-20251001}"
      PG_DSN: "postgresql://postgres:${POSTGRES_PASSWORD}@homeai-postgres:5432/homeai"
      # R2 realm gate (U52). Present for parity with build-dashboard. Bot is
      # realm-aware regardless because sender_realm is fetched from the
      # server-trusted bot_sender_whitelist, not an HTTP header.
      REALM_ENFORCE: "1"
    restart: unless-stopped

  # ── U71 T2 — critical-listener ─────────────────────────────────────────
  # LISTENs on the `telegram_immediate` channel; forwards mart.exceptions
  # rows with severity='critical' to Telegram in <30s. Quiet for non-
  # critical severities — those get rolled up by the morning digest.
  critical-listener:
    build: ./services/critical-listener
    container_name: homeai-critical-listener
    networks: [ai-internal, ai-egress]
    depends_on:
      postgres: {condition: service_healthy}
      vault:    {condition: service_started}
    environment:
      VAULT_ADDR:   "http://vault:8200"
      VAULT_TOKEN:  "${VAULT_TOKEN}"
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@homeai-postgres:5432/homeai"
    restart: unless-stopped

  # ── U62 T3 — Paperless-ngx ─────────────────────────────────────────────
  # Phase-3 scanner intake. Brother ADS-2800W SMB-drops PDFs into
  # ./storage/paperless/consume on the host; the container OCRs and serves
  # them. The u62-paperless-sync.sh cron pulls into the local `documents`
  # table so the linker can connect them to vehicles/properties/children.
  # Behind the existing Caddy/Authelia stack on port 8011.
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.13.5
    mem_limit: 1g
    container_name: homeai-paperless
    # ai-proxy added so 100.104.82.53:8011 host port works (ai-internal +
    # ai-services are both internal:true and block port publishing).
    networks: [ai-internal, ai-services, ai-proxy]
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_started}
    ports:
      - "100.104.82.53:8011:8000"
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      # U73 — consume folder is on the 6TB HD, also the Brother scanner's
      # Samba drop point (share=scans, user=scanner). Brother writes a PDF
      # into /mnt/shared_storage/scans/inbox → Paperless picks it up within
      # 30s → POST_CONSUME_SCRIPT webhooks build-dashboard.
      - /mnt/shared_storage/scans/inbox:/usr/src/paperless/consume
      - ./storage/paperless/export:/usr/src/paperless/export
      # U70 T1 — POST_CONSUME_SCRIPT runs after each ingest and webhooks
      # build-dashboard so docs land in our documents + vendor_invoice_inbox.
      - ./scripts/paperless-post-consume.sh:/usr/src/paperless/scripts/post-consume.sh:ro
    environment:
      PAPERLESS_DBHOST: homeai-postgres
      PAPERLESS_DBPORT: "5432"
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: "${PAPERLESS_DB_PASSWORD}"
      PAPERLESS_REDIS:  "redis://:${REDIS_PASSWORD}@redis:6379/2"
      PAPERLESS_SECRET_KEY: "${PAPERLESS_SECRET_KEY}"
      PAPERLESS_TIME_ZONE: "Europe/London"
      PAPERLESS_OCR_LANGUAGE: "eng"
      PAPERLESS_CONSUMER_POLLING: "30"
      PAPERLESS_URL: "http://100.104.82.53:8011"
      PAPERLESS_ADMIN_USER: "jo"
      PAPERLESS_ADMIN_PASSWORD: "${PAPERLESS_ADMIN_PASSWORD}"
      USERMAP_UID: "1000"
      USERMAP_GID: "1000"
      # U70 T1 — post-consume hook
      PAPERLESS_POST_CONSUME_SCRIPT: "/usr/src/paperless/scripts/post-consume.sh"
      PAPERLESS_WEBHOOK_URL:    "http://homeai-build-dashboard:8090/api/documents/ingest-from-paperless"
      PAPERLESS_WEBHOOK_SECRET: "${PAPERLESS_WEBHOOK_SECRET}"
      PAPERLESS_API_TOKEN:      "${PAPERLESS_API_TOKEN:-}"
    restart: unless-stopped

volumes:
  postgres_data:
  # U140 — tmpfs-backed volume for Vault Agent-rendered secrets.
  homeai_secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0755"
  n8n_data:
  ollama_data:
  vault_data:
  grafana_data:
  open_webui_data:
  caddy_data:
  alertmanager_data:
  caddy_config:
  paperless_data:
  paperless_media:
