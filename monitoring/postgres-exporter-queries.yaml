# Custom queries for postgres_exporter — Home AI business metrics.
#
# Each block becomes a metric family. The 'query' is run on every scrape
# (15s by default) so keep it cheap. All counts/aggregates only — no joins
# across large tables. Metrics are exposed at /metrics on the exporter.

events_pending:
  query: "SELECT event_type, count(*)::float AS count FROM events WHERE status = 'pending' GROUP BY event_type"
  master: true
  metrics:
    - event_type:
        usage: "LABEL"
        description: "Type of event"
    - count:
        usage: "GAUGE"
        description: "Number of events with status='pending' by event_type"

events_status:
  query: "SELECT status, count(*)::float AS count FROM events GROUP BY status"
  master: true
  metrics:
    - status:
        usage: "LABEL"
        description: "Event status"
    - count:
        usage: "GAUGE"
        description: "Number of events grouped by status"

events_overflow:
  query: "SELECT count(*)::float AS count FROM events_overflow"
  master: true
  metrics:
    - count:
        usage: "GAUGE"
        description: "Rows in events_overflow partition (should always be 0)"

dead_letter:
  query: "SELECT count(*)::float AS count FROM dead_letter"
  master: true
  metrics:
    - count:
        usage: "GAUGE"
        description: "Total rows in dead_letter table"

dead_letter_recent:
  query: "SELECT count(*)::float AS count FROM dead_letter WHERE created_at > NOW() - INTERVAL '1 hour'"
  master: true
  metrics:
    - count:
        usage: "GAUGE"
        description: "Dead-letter rows added in the last hour"

audit_log_recent:
  # Fallback row '_none_' / '_none_' / 0 ensures the metric is always emitted,
  # even when no audit activity in the last hour. Otherwise postgres_exporter
  # drops the whole metric family and dashboards / alert rules silently miss it.
  query: |
    SELECT * FROM (
      SELECT pipeline, result, count(*)::float AS count
        FROM audit_log
       WHERE created_at > NOW() - INTERVAL '1 hour'
       GROUP BY pipeline, result
      UNION ALL
      SELECT '_none_'::text, '_none_'::text, 0::float
    ) x
  master: true
  metrics:
    - pipeline:
        usage: "LABEL"
        description: "Pipeline name"
    - result:
        usage: "LABEL"
        description: "success | failure | escalate | etc"
    - count:
        usage: "GAUGE"
        description: "audit_log rows in the last hour by pipeline+result"

bank_unreconciled:
  query: "SELECT count(*)::float AS count FROM bank_transactions WHERE reconciled = false"
  master: true
  metrics:
    - count:
        usage: "GAUGE"
        description: "Bank transactions awaiting reconciliation"

emails_review_queue:
  query: |
    SELECT count(*)::float AS count
      FROM emails
     WHERE requires_human = true
        OR confidence_score < 0.75
        OR NOT processed
        OR action_required = true
  master: true
  metrics:
    - count:
        usage: "GAUGE"
        description: "Emails currently in the human review queue"

events_partition_rows:
  # One row per child partition of `events`. Cheap because pg_class.reltuples
  # is the planner's row estimate (no full scan). Updates on autovacuum.
  query: |
    SELECT child.relname AS partition,
           pg_class_apply.reltuples::float AS reltuples
      FROM pg_inherits i
      JOIN pg_class parent      ON parent.oid = i.inhparent
      JOIN pg_class child       ON child.oid  = i.inhrelid
      JOIN pg_class pg_class_apply ON pg_class_apply.oid = child.oid
     WHERE parent.relname = 'events'
  master: true
  metrics:
    - partition:
        usage: "LABEL"
        description: "Partition name (events_YYYY_MM or events_overflow)"
    - reltuples:
        usage: "GAUGE"
        description: "Estimated row count (pg_class.reltuples)"

hmac_verification_recent:
  # From audit_log rows written by hmac-verifier-v1 daily run.
  query: |
    SELECT
      COALESCE(SUM((ai_parsed->>'verified')::int), 0)::float AS verified_24h,
      COALESCE(SUM((ai_parsed->>'failed')::int),   0)::float AS failed_24h,
      COALESCE(SUM((ai_parsed->>'sample_size')::int), 0)::float AS sample_24h
    FROM audit_log
    WHERE pipeline = 'hmac_verifier'
      AND created_at > NOW() - INTERVAL '24 hours'
  master: true
  metrics:
    - verified_24h:
        usage: "GAUGE"
        description: "HMAC signatures verified in last 24h"
    - failed_24h:
        usage: "GAUGE"
        description: "HMAC signature verification failures in last 24h"
    - sample_24h:
        usage: "GAUGE"
        description: "Total events sampled for HMAC verification in last 24h"

stale_lease_recovery_recent:
  # Counts of recover_stale_leases activity in the last hour, derived from
  # the JSONB ai_parsed column written by V14.
  query: |
    SELECT
      COALESCE(SUM((ai_parsed->>'recovered_count')::int), 0)::float     AS recovered_recent,
      COALESCE(SUM((ai_parsed->>'dead_lettered_count')::int), 0)::float AS dead_lettered_recent
    FROM audit_log
    WHERE pipeline = 'master_router'
      AND action   = 'stale_lease_recovery'
      AND created_at > NOW() - INTERVAL '1 hour'
  master: true
  metrics:
    - recovered_recent:
        usage: "GAUGE"
        description: "Stale leases recovered in the last hour"
    - dead_lettered_recent:
        usage: "GAUGE"
        description: "Events dead-lettered by stale lease recovery in the last hour"

events_processing_lease_age:
  # Max processing age of in-flight events. If this grows unbounded, leases
  # are stuck — recover_stale_leases() should be running.
  query: |
    SELECT COALESCE(EXTRACT(EPOCH FROM (NOW() - MIN(processing_started_at))), 0)::float AS oldest_seconds
      FROM events
     WHERE status = 'processing'
  master: true
  metrics:
    - oldest_seconds:
        usage: "GAUGE"
        description: "Age in seconds of the oldest in-flight processing lease (0 when no in-flight events)"

# =============================================================================
# Phase 5 (U141+U143+U144): AI spend, redaction events, quota status.
# =============================================================================

ai_spend_today_by_tier:
  query: |
    SELECT COALESCE(business_priority, 'untagged') AS tier,
           COALESCE(SUM(cost_gbp), 0)::float AS spent_gbp
      FROM ai_usage
     WHERE "timestamp" >= CURRENT_DATE
     GROUP BY 1
  master: true
  metrics:
    - tier:
        usage: "LABEL"
    - spent_gbp:
        usage: "GAUGE"
        description: "GBP spent on AI calls today, per priority tier"

ai_call_count_today_by_tier:
  query: |
    SELECT COALESCE(business_priority, 'untagged') AS tier,
           COUNT(*)::float AS calls
      FROM ai_usage
     WHERE "timestamp" >= CURRENT_DATE
     GROUP BY 1
  master: true
  metrics:
    - tier:
        usage: "LABEL"
    - calls:
        usage: "GAUGE"
        description: "Number of AI calls today, per priority tier"

ai_spend_7d_by_tier:
  query: |
    SELECT COALESCE(business_priority, 'untagged') AS tier,
           COALESCE(SUM(cost_gbp), 0)::float AS spent_gbp
      FROM ai_usage
     WHERE "timestamp" >= NOW() - INTERVAL '7 days'
     GROUP BY 1
  master: true
  metrics:
    - tier:
        usage: "LABEL"
    - spent_gbp:
        usage: "GAUGE"
        description: "GBP spent on AI calls last 7 days, per priority tier"

ai_quota_ceiling:
  query: |
    SELECT business_priority AS tier,
           daily_cost_ceiling_gbp::float AS ceiling_gbp,
           CASE WHEN enforce_mode THEN 1.0 ELSE 0.0 END AS enforce_mode
      FROM quota_allocations
  master: true
  metrics:
    - tier:
        usage: "LABEL"
    - ceiling_gbp:
        usage: "GAUGE"
        description: "Daily GBP ceiling per priority tier"
    - enforce_mode:
        usage: "GAUGE"
        description: "1 = enforce mode active (429 on exhaustion); 0 = shadow mode"

ai_quota_shadow_blocked_today:
  query: |
    SELECT COALESCE(business_priority, 'untagged') AS tier,
           COUNT(*) FILTER (WHERE would_block_reason IS NOT NULL)::float AS shadow_blocked
      FROM ai_usage
     WHERE "timestamp" >= CURRENT_DATE
     GROUP BY 1
  master: true
  metrics:
    - tier:
        usage: "LABEL"
    - shadow_blocked:
        usage: "GAUGE"
        description: "Today's count of would-have-blocked calls (shadow mode logging)"

redaction_24h_by_status:
  query: |
    SELECT status, COUNT(*)::float AS events
      FROM redaction_audit_log
     WHERE ts >= NOW() - INTERVAL '24 hours'
     GROUP BY 1
  master: true
  metrics:
    - status:
        usage: "LABEL"
    - events:
        usage: "GAUGE"
        description: "Count of redaction events last 24h by status (ok/hard_fail/degraded/bypass)"

redaction_avg_latency_ms_24h:
  query: |
    SELECT COALESCE(ROUND(AVG(latency_ms))::float, 0) AS avg_ms
      FROM redaction_audit_log
     WHERE ts >= NOW() - INTERVAL '24 hours' AND status='ok'
  master: true
  metrics:
    - avg_ms:
        usage: "GAUGE"
        description: "Average Presidio /redact latency in ms over last 24h (status=ok)"

redaction_hard_fail_today:
  query: |
    SELECT COUNT(*)::float AS hard_fails
      FROM redaction_audit_log
     WHERE ts >= CURRENT_DATE AND status='hard_fail'
  master: true
  metrics:
    - hard_fails:
        usage: "GAUGE"
        description: "Count of redaction hard-fail events today — non-zero means a cloud-bound LLM call was blocked because Presidio was unreachable. Pages oncall if >0."
