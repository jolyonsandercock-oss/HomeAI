global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: [homeai-alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # PostgreSQL is scraped via the postgres_exporter sidecar (port 9187),
  # not the Postgres SQL port — Postgres has no native /metrics endpoint.
  # 60s job-level interval (2026-07-03 perf pass): each scrape runs ~20 custom
  # SQL queries (queries.yaml), several of them whole-table counts — at the
  # global 15s that was ~115k queries/day of constant DB load for
  # minute-granularity metrics.
  - job_name: postgres
    scrape_interval: 60s
    static_configs:
      - targets: [homeai-postgres-exporter:9187]

  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: [homeai-n8n:5678]

  # U226: ollama /api/version probe via blackbox-exporter.
  # Yields probe_success{job="ollama"} = 1 healthy, 0 down.
  - job_name: ollama
    metrics_path: /probe
    params:
      module: [ollama_version]
    static_configs:
      - targets: ['http://homeai-ollama:11434/api/version']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: homeai-blackbox-exporter:9115

  # Vault metrics — vault.hcl now has `telemetry { unauthenticated_metrics_access = true }`
  # in the listener block (U14, 2026-05-10). Telemetry config in Vault 1.15 is
  # NOT hot-reloadable, so this scrape job stays commented until the next time
  # vault is restarted (typically a host reboot via start.sh). After that
  # restart, uncomment the four lines below and run:
  #   docker restart homeai-prometheus
  #
  # - job_name: vault
  #   metrics_path: /v1/sys/metrics
  #   params:
  #     format: [prometheus]
  #   static_configs:
  #     - targets: [homeai-vault:8200]
