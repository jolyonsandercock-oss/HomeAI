  - severity: low
    title: Hooks not installed in user settings
    detail: ".claude/hooks/no-secrets-in-files.sh + sql-rules.sh exist and tested. PreToolUse install in ~/.claude/settings.json is opt-in (agent cannot self-modify). U13 produced runnable installer at /home_ai/.claude/scripts/u13-install-hooks.sh — backs up, jq-merges, runs negative tests. Run: bash /home_ai/.claude/scripts/u13-install-hooks.sh"
    unblocks: Hard enforcement of the no-secrets / RLS / HMAC build rules
    estimate: 2 min — run u13-install-hooks.sh

  - severity: low
    title: Authelia bootstrapped but Vault ≠ rendered config (cosmetic mismatch)
    detail: >
      2026-05-11 — authelia/authelia 4.39.19 pulled, users_database.yml written,
      container ready to start. The old bootstrap script (pre-template rewrite)
      was used — generated fresh JWT + encryption secrets into Vault but its
      sed could not match the rendered configuration.yml so the file kept the
      original values. Authelia reads from the file at runtime, so SSO works;
      the divergence only matters if a future operation reads secrets from
      Vault (none today). To clean up, re-run scripts/authelia-bootstrap.sh,
      answer Y at the "Import existing into Vault?" prompts, then docker
      compose restart authelia. Also uncomment authelia + caddy-forward-auth
      blocks in docker-compose.yml and wire forward_auth to protect /dashboard
      and /metabase.
    unblocks: Clean rotation path, full Phase 2 access layer
    estimate: 30 min