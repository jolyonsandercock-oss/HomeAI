  - severity: low
    title: AI workers use postgres-superuser DSN — R6 enforcement gap
    detail: >
      U55 patched 9 AI worker scripts to SET app.current_realm at connection.
      They connect via PG_DSN as 'postgres' (BYPASSRLS), so the realm GUC
      is documentation-active only — RLS doesn't actually fire. Switch
      PG_DSN to homeai_pipeline for those scripts to close the loop.
      Verify INSERT/UPDATE grants per script before flipping (some write
      to ai_usage, dreaming_runs, vendor_invoice_inbox, etc).
    unblocks: True R6 enforcement
    estimate: 90 min

  - severity: medium
    title: Realm R3 (Auth) — blocked on tailscale-cert FQDN before forward_auth
    detail: >
      U52 shipped R1 + R2 (realm column on 93 tables, RLS realm_isolation on
      87) and wired REALM_ENFORCE on build-dashboard (default 0, dormant).
      Flipping REALM_ENFORCE to 1 requires Authelia + Caddy to inject an
      X-Realm header, which requires forward_auth, which requires a
      tailscale-cert FQDN — needs Jo at the box. Until then every request
      runs as OWNER realm (transitional pass-through). See [[realm-split-architecture]].
    unblocks: REALM_ENFORCE=1, per-user dashboard scoping, future WORK/FAMILY logins
    estimate: 30 min once FQDN cert is in place

  - severity: medium
    title: P3 Xero Sync — PARKED (3rd attempt 2026-05-14) awaiting Xero support
    detail: >
      Third attempt 2026-05-14. First request with full scope list returned
      'invalid_scope'. Reduced to offline_access only — that scope was
      accepted, but Xero's consent-render page then served a generic 500
      with no visible errorId. Suggests Xero-side consent UI failure rather
      than scope or config. App is Web app, redirect URI matches
      http://localhost:8976/callback. Email to api@xero.com from U29 still
      unanswered. Re-run scripts/u29-xero-bootstrap.py with full scopes once
      Xero replies. Until unblocked, P2 invoice matching cannot complete.
    unblocks: P2 invoice → Xero match, P3 Pipeline 3, payment reconciliation
    estimate: 30 min once Xero replies + 30 min wiring

