  - severity: medium
    title: P5/P6 need Playwright-based scraping (no email export available)
    detail: User confirmed 2026-05-11 — neither TouchOffice nor Caterbook can email daily reports. Both portals are browser-only. Current Pipeline 5/6 (Gmail-trigger + Haiku report_parser) cannot fire. Scoped as U27 sprint — build a Playwright scraper service (headless Chromium in a container on ai-internal), cron-triggered daily, that logs into touchoffice.net + Caterbook, extracts the same fields the existing parsers expect, and emits epos.report.received / accommodation.received events. Existing parser/validator/INSERT nodes stay; only the trigger + source change. Old debt note about "format unknown from fixtures" is moot — Playwright extracts directly from the rendered HTML.
    unblocks: Useful epos_daily / accommodation_daily rows
    estimate: 4-6h (see /home_ai/.claude/sprints/U27-playwright-p5-p6.md)

