  - severity: medium
    title: P5/P6 parsers built for fixture format, real Caterbook/TouchOffice formats unknown
    detail: P5 EPOS parser expects "ICRTouch Z-Report" plaintext daily summary; P6 Caterbook parser expects "Caterbook Daily Report" plaintext occupancy summary. Both shapes come from benchmark fixtures. Real Caterbook traffic at 2026-05-10 is per-booking notifications + "Arrivals/Departures" with PDF attachment (no parseable body). No real EPOS emails in inbox yet. Pipelines will mark these as unparseable and log to audit_log — not broken, but no useful rows in epos_daily/accommodation_daily until either (a) Caterbook Daily Report email is enabled in their portal, (b) PDF parsing is added for Arrivals/Departures, or (c) format spec is captured from a real sample.
    unblocks: Useful epos_daily / accommodation_daily rows
    estimate: 1-2h once a real sample of each report format is in hand

  - severity: medium
    title: Restic repo is local-only
    detail: /home_ai/backups/restic-local — not on NAS. Lost-host = lost backups. U13 produced runnable installer at /home_ai/.claude/scripts/u13-mount-nas.sh — interactive (SMB or NFS), idempotent, copies existing snapshots to NAS, repoints crontab, leaves local repo as warm spare. Run as root.
    unblocks: True off-machine DR
    estimate: 5 min — sudo bash u13-mount-nas.sh
  - severity: low
    title: Backup-all.sh git push commented
    detail: scripts/backup-all.sh has the git push block disabled until the remote is verified safe.
    unblocks: Off-host config history
    estimate: Set up clean private repo + uncomment block

  - severity: low
    title: Hooks not installed in user settings
    detail: ".claude/hooks/no-secrets-in-files.sh + sql-rules.sh exist and tested. PreToolUse install in ~/.claude/settings.json is opt-in (agent cannot self-modify). U13 produced runnable installer at /home_ai/.claude/scripts/u13-install-hooks.sh — backs up, jq-merges, runs negative tests. Run: bash /home_ai/.claude/scripts/u13-install-hooks.sh"
    unblocks: Hard enforcement of the no-secrets / RLS / HMAC build rules
    estimate: 2 min — run u13-install-hooks.sh

  - severity: low
    title: Authelia 2FA not yet bootstrapped
    detail: Container scaffolded (config in /home_ai/security/authelia/), image pinned (4.39.19), /auth route reserved on Caddy. Bootstrap blocked on root file ownership of configuration.yml + need to generate JWT_SECRET / SESSION_SECRET / STORAGE_ENCRYPTION_KEY in Vault. Once unblocked, wire Caddy forward_auth to protect /dashboard and /metabase admin.
    unblocks: SSO + 2FA on internal tools, full Phase 2 access layer
    estimate: 60 min once a sudo session is available