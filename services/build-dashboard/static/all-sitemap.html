<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>All — Home AI</title>

<script src="/static/vendor/tailwind-3.4.min.js"></script>
<script defer src="/static/vendor/alpine-3.14.min.js"></script>
<script src="/static/_components/realm-toggle.js"></script>

<style>
  :root { color-scheme: dark; }
  body {
    background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
    min-height: 100vh; color: #e2e8f0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .glass { background: rgba(15,23,42,0.7); border: 1px solid rgba(148,163,184,0.15); }
  .mono  { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; }
  .skel  { background: linear-gradient(90deg, rgba(148,163,184,0.06) 0%, rgba(148,163,184,0.12) 50%, rgba(148,163,184,0.06) 100%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; border-radius: 6px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body x-data="allSitemap()" x-init="boot()">

<header class="sticky top-0 z-40 backdrop-blur-md bg-slate-950/80 border-b border-white/5"
        x-data="homeaiHeader()" x-init="boot()">
  <div class="max-w-3xl mx-auto px-3 py-2 flex items-center gap-2">
    <a href="/" class="flex items-center gap-2 text-zinc-100 min-h-[44px]" aria-label="Home AI">
      <span class="text-xl leading-none">⌂</span>
      <span class="font-semibold text-sm">Home AI</span>
    </a>
    <div class="ml-2 flex bg-white/5 rounded-lg p-0.5 text-sm min-h-[44px] items-center"
         role="tablist" aria-label="Realm filter">
      <button type="button" role="tab"
              :aria-selected="realm === 'work'" :tabindex="realm === 'work' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-amber-400/60"
              :class="realm === 'work' ? 'bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('work')"
              @keydown.right.prevent="setRealm('all')"
              @keydown.left.prevent="setRealm('work')">Work</button>
      <button type="button" role="tab"
              :aria-selected="realm === 'all'" :tabindex="realm === 'all' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-emerald-400/60"
              :class="realm === 'all' ? 'bg-emerald-500/20 text-emerald-200 ring-1 ring-emerald-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('all')"
              @keydown.right.prevent="setRealm('all')"
              @keydown.left.prevent="setRealm('work')">All</button>
    </div>
    <nav class="ml-auto flex items-center gap-1 text-sm text-zinc-400" aria-label="Primary">
      <a href="/build/pipelines" class="px-2 min-h-[44px] flex items-center rounded-md hover:text-zinc-100 hover:bg-white/5">Build</a>
      <a href="/all" class="px-2 min-h-[44px] flex items-center rounded-md text-zinc-100 bg-white/10">All</a>
    </nav>
  </div>
</header>

<script>
  window.homeaiHeader = function () {
    return {
      realm: 'all',
      boot() {
        this.realm = (window.HomeAI && window.HomeAI.getRealm()) || 'all';
        window.addEventListener('realm-changed', (e) => { this.realm = e.detail.realm; });
      },
      setRealm(next) { if (window.HomeAI && window.HomeAI.setRealm) window.HomeAI.setRealm(next); }
    };
  };
</script>

<main class="max-w-3xl mx-auto p-3 space-y-3">

  <div class="flex items-baseline justify-between mb-2">
    <h1 class="text-base font-semibold">All</h1>
    <span class="text-xs text-slate-500">Every page, every slug, every view</span>
  </div>

  <!-- Search input -->
  <div class="glass rounded-lg p-3">
    <label for="all-search" class="text-xs uppercase tracking-wider text-slate-500">Search</label>
    <input id="all-search" type="search"
           x-model="query" @input.debounce.250ms="runSearch()"
           placeholder="page name, slug, view, …"
           class="mt-1 w-full bg-black/40 border border-white/10 rounded-md px-3 min-h-[44px] text-zinc-100
                  focus-visible:ring-2 focus-visible:ring-amber-400/60 focus-visible:outline-none">
  </div>

  <!-- Search results -->
  <section x-show="results.length > 0" x-cloak class="space-y-2">
    <h2 class="text-xs uppercase tracking-wider text-slate-500 px-1">Results</h2>
    <template x-for="r in results" :key="r.kind + '|' + r.label">
      <div class="glass rounded-lg p-3 flex items-start gap-3">
        <span class="text-xs uppercase tracking-wider px-2 py-1 rounded shrink-0 mono"
              :class="{
                'bg-amber-500/10 text-amber-300': r.kind === 'page',
                'bg-emerald-500/10 text-emerald-300': r.kind === 'slug',
                'bg-violet-500/10 text-violet-300': r.kind === 'view'
              }"
              x-text="r.kind"></span>
        <div class="flex-1 min-w-0">
          <div class="mono text-sm text-zinc-100 truncate" x-text="r.label"></div>
          <div class="text-xs text-slate-500 mt-0.5" x-text="r.detail"></div>
        </div>
        <template x-if="r.href">
          <a :href="r.href" class="text-amber-300 text-sm min-h-[44px] px-2 flex items-center">→</a>
        </template>
      </div>
    </template>
  </section>

  <!-- Loading + sections (when no search) -->
  <template x-if="loading && results.length === 0">
    <div class="space-y-2">
      <div class="glass rounded-lg p-3 h-12 skel"></div>
      <div class="glass rounded-lg p-3 h-12 skel"></div>
      <div class="glass rounded-lg p-3 h-12 skel"></div>
    </div>
  </template>

  <template x-if="!loading && results.length === 0">
    <div class="space-y-3">

      <!-- Pages -->
      <section aria-label="Pages">
        <h2 class="text-xs uppercase tracking-wider text-slate-500 px-1 mb-1">
          Pages
          <span class="text-slate-600 mono" x-text="`(${pages.length})`"></span>
        </h2>
        <div class="glass rounded-lg p-2">
          <template x-for="p in pages" :key="p.path">
            <a :href="p.path"
               class="flex items-center px-2 min-h-[44px] rounded-md hover:bg-white/5
                      focus-visible:ring-2 focus-visible:ring-amber-400/60 focus-visible:outline-none">
              <span class="mono text-sm text-zinc-200" x-text="p.path"></span>
            </a>
          </template>
        </div>
      </section>

      <!-- Slugs -->
      <section aria-label="Slugs">
        <h2 class="text-xs uppercase tracking-wider text-slate-500 px-1 mb-1">
          Slugs
          <span class="text-slate-600 mono" x-text="`(${slugs.length})`"></span>
        </h2>
        <div class="glass rounded-lg p-2 space-y-1">
          <template x-for="s in slugs" :key="s.slug">
            <a :href="`/api/finance/slug/${s.slug}`"
               class="flex items-start gap-2 px-2 py-2 rounded-md hover:bg-white/5
                      focus-visible:ring-2 focus-visible:ring-emerald-400/60 focus-visible:outline-none">
              <div class="flex-1 min-w-0">
                <div class="mono text-sm text-zinc-100" x-text="s.slug"></div>
                <div class="text-xs text-slate-500 truncate" x-text="s.description || s.display_name"></div>
              </div>
              <span class="text-xs text-slate-600 mono" x-text="s.realm"></span>
            </a>
          </template>
        </div>
      </section>

      <!-- Views -->
      <section aria-label="Database views">
        <h2 class="text-xs uppercase tracking-wider text-slate-500 px-1 mb-1">
          Views
          <span class="text-slate-600 mono" x-text="`(${views.length})`"></span>
        </h2>
        <div class="glass rounded-lg p-2">
          <template x-for="v in views" :key="v.schema + '.' + v.name">
            <div class="flex items-center px-2 min-h-[44px]">
              <span class="mono text-sm text-zinc-300" x-text="v.schema + '.' + v.name"></span>
            </div>
          </template>
        </div>
      </section>
    </div>
  </template>
</main>

<script>
  window.allSitemap = () => ({
    loading: true,
    error: null,
    query: '',
    results: [],
    pages: [], slugs: [], views: [],

    async boot() {
      if (window.HomeAI && window.HomeAI.registerRealmHandshake) {
        window.HomeAI.registerRealmHandshake(async () => { await this.loadAll(); });
      }
      await this.loadAll();
    },

    async loadAll() {
      this.loading = true;
      try {
        const r = await fetch('/api/all/sitemap');
        if (!r.ok) throw new Error(`Sitemap ${r.status}`);
        const data = await r.json();
        this.pages = data.pages || [];
        this.slugs = data.slugs || [];
        this.views = data.views || [];
      } catch (e) {
        this.error = e.message || String(e);
      } finally {
        this.loading = false;
      }
    },

    async runSearch() {
      const q = (this.query || '').trim();
      if (q.length < 2) { this.results = []; return; }
      try {
        const r = await fetch(`/api/all/search?q=${encodeURIComponent(q)}`);
        if (!r.ok) throw new Error(`Search ${r.status}`);
        const data = await r.json();
        this.results = data.results || [];
      } catch (e) {
        this.results = [];
      }
    }
  });
</script>
</body>
</html>
