<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>Build · Forensics — Home AI</title>

<script src="/static/vendor/tailwind-3.4.min.js"></script>
<script defer src="/static/vendor/alpine-3.14.min.js"></script>
<script src="/static/_components/realm-toggle.js"></script>

<style>
  :root { color-scheme: dark; }
  body { background: linear-gradient(180deg, #0f172a 0%, #020617 100%); min-height: 100vh; color: #e2e8f0;
         font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  .glass { background: rgba(15,23,42,0.7); border: 1px solid rgba(148,163,184,0.15); }
  .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  .tl{display:inline-block;width:9px;height:9px;border-radius:999px;margin-right:6px;vertical-align:middle;box-shadow:0 0 6px currentColor}
  .tl-red{background:#f43f5e;color:#f43f5e;animation:pulse 1.4s infinite}
  .tl-amber{background:#f59e0b;color:#f59e0b}.tl-green{background:#10b981;color:#10b981}
  @keyframes pulse{50%{opacity:0.55}}
  .skel{background:linear-gradient(90deg,rgba(148,163,184,0.06) 0%,rgba(148,163,184,0.12) 50%,rgba(148,163,184,0.06) 100%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body x-data="buildForensics()" x-init="boot()">

<header class="sticky top-0 z-40 backdrop-blur-md bg-slate-950/80 border-b border-white/5"
        x-data="homeaiHeader()" x-init="boot()">
  <div class="max-w-3xl mx-auto px-3 py-2 flex items-center gap-2">
    <a href="/" class="flex items-center gap-2 text-zinc-100 min-h-[44px]" aria-label="Home AI">
      <span class="text-xl leading-none">⌂</span>
      <span class="font-semibold text-sm">Home AI</span>
    </a>
    <div class="ml-2 flex bg-white/5 rounded-lg p-0.5 text-sm min-h-[44px] items-center" role="tablist" aria-label="Realm filter">
      <button type="button" role="tab" :aria-selected="realm === 'work'" :tabindex="realm === 'work' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-amber-400/60"
              :class="realm === 'work' ? 'bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('work')" @keydown.right.prevent="setRealm('all')" @keydown.left.prevent="setRealm('work')">Work</button>
      <button type="button" role="tab" :aria-selected="realm === 'all'" :tabindex="realm === 'all' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-emerald-400/60"
              :class="realm === 'all' ? 'bg-emerald-500/20 text-emerald-200 ring-1 ring-emerald-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('all')" @keydown.right.prevent="setRealm('all')" @keydown.left.prevent="setRealm('work')">All</button>
    </div>
    <nav class="ml-auto flex items-center gap-1 text-sm text-zinc-400" aria-label="Primary">
      <a href="/build/pipelines" class="px-2 min-h-[44px] flex items-center rounded-md text-zinc-100 bg-white/10">Build</a>
      <a href="/all" class="px-2 min-h-[44px] flex items-center rounded-md hover:text-zinc-100 hover:bg-white/5">All</a>
    </nav>
  </div>
</header>

<script>
  window.homeaiHeader = function () {
    return {
      realm: 'all',
      boot() {
        this.realm = (window.HomeAI && window.HomeAI.getRealm()) || 'all';
        window.addEventListener('realm-changed', (e) => { this.realm = e.detail.realm; });
      },
      setRealm(next) { if (window.HomeAI && window.HomeAI.setRealm) window.HomeAI.setRealm(next); }
    };
  };
</script>

<main class="max-w-3xl mx-auto p-3 space-y-3">

  <nav class="flex gap-1 text-sm" aria-label="Build sections">
    <a href="/build/pipelines" class="px-3 min-h-[44px] flex items-center rounded-md text-zinc-400 hover:text-zinc-200 hover:bg-white/5">Pipelines</a>
    <a href="/build/models" class="px-3 min-h-[44px] flex items-center rounded-md text-zinc-400 hover:text-zinc-200 hover:bg-white/5">Models</a>
    <a href="/build/forensics" class="px-3 min-h-[44px] flex items-center rounded-md bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40">Forensics</a>
    <span class="ml-auto mono text-xs text-slate-500 self-center" x-text="lastRefresh"></span>
  </nav>

  <h1 class="text-base font-semibold">Forensics</h1>

  <!-- Severity tiles -->
  <section class="grid grid-cols-2 sm:grid-cols-4 gap-2" aria-label="Exception counts">
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-rose-400">Critical</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading">
        <div class="text-2xl mono font-semibold mt-1">
          <span class="tl" :class="kpi.critical_open > 0 ? 'tl-red' : 'tl-green'"></span>
          <span x-text="kpi.critical_open || 0"></span>
        </div>
      </template>
    </div>
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-amber-400">High</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading"><div class="text-2xl mono font-semibold mt-1" x-text="kpi.high_open || 0"></div></template>
    </div>
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-yellow-200">Medium</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading"><div class="text-2xl mono font-semibold mt-1" x-text="kpi.medium_open || 0"></div></template>
    </div>
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-slate-500">Low</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading"><div class="text-2xl mono font-semibold mt-1" x-text="kpi.low_open || 0"></div></template>
    </div>
  </section>

  <section class="grid grid-cols-3 gap-2" aria-label="Activity">
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-slate-500">Raised · 24h</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading"><div class="text-2xl mono font-semibold mt-1" x-text="kpi.raised_24h || 0"></div></template>
    </div>
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-slate-500">Resolved · 24h</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading"><div class="text-2xl mono font-semibold mt-1 text-emerald-300" x-text="kpi.resolved_24h || 0"></div></template>
    </div>
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-slate-500">Anomalies flagged</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading"><div class="text-2xl mono font-semibold mt-1" x-text="kpi.anomalies_flagged || 0"></div></template>
    </div>
  </section>

  <!-- Top 10 open exceptions -->
  <section aria-label="Open exceptions">
    <div class="flex items-center justify-between mb-1 px-1">
      <h2 class="text-xs uppercase tracking-wider text-slate-500">Top open exceptions</h2>
      <a href="/forensics" class="text-xs text-amber-300 hover:text-amber-200 min-h-[44px] px-2 flex items-center">Full list →</a>
    </div>
    <template x-if="loadingActions">
      <div class="space-y-2">
        <div class="glass rounded-lg p-3 h-12 skel"></div>
        <div class="glass rounded-lg p-3 h-12 skel"></div>
      </div>
    </template>
    <template x-if="!loadingActions && actions.length > 0">
      <ul class="space-y-1.5" role="list">
        <template x-for="a in actions.slice(0, 10)" :key="a.ref">
          <li class="glass rounded-lg p-3 flex items-start gap-2">
            <span class="tl mt-2 shrink-0"
                  :class="{ 'tl-red': a.severity === 'critical', 'tl-amber': a.severity === 'high', 'tl-green': a.severity === 'medium' }"
                  :aria-label="`Severity ${a.severity}`"></span>
            <div class="flex-1 min-w-0">
              <div class="text-sm text-slate-200 truncate" x-text="a.title"></div>
              <div class="text-xs text-slate-500 mt-0.5">
                <span x-text="a.kind"></span> · <span x-text="a.age_days + 'd'"></span> ·
                <span x-text="a.realm"></span>
              </div>
            </div>
            <span class="mono text-xs text-slate-600" x-text="'#' + a.ref"></span>
          </li>
        </template>
      </ul>
    </template>
    <template x-if="!loadingActions && actions.length === 0">
      <div class="glass rounded-lg p-4 text-center text-emerald-300 border-emerald-500/20">
        <div class="text-2xl mb-1">✓</div>
        <div class="text-sm">No open exceptions ≥ medium.</div>
      </div>
    </template>
  </section>
</main>

<script>
  window.buildForensics = () => ({
    loading: true,
    loadingActions: true,
    error: null,
    kpi: {},
    actions: [],
    lastRefresh: '',
    async boot() {
      if (window.HomeAI && window.HomeAI.registerRealmHandshake) {
        window.HomeAI.registerRealmHandshake(async () => { await this.loadAll(); });
      }
      await this.loadAll();
    },
    async loadAll() {
      this.loading = true;
      this.loadingActions = true;
      try {
        await Promise.all([this.loadKpi(), this.loadActions()]);
        this.lastRefresh = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
        this.loadingActions = false;
      }
    },
    async loadKpi() {
      const r = await fetch('/api/finance/slug/build_forensic_summary');
      if (!r.ok) throw new Error(`forensic ${r.status}`);
      const d = await r.json();
      this.kpi = (d.rows && d.rows[0]) || {};
    },
    async loadActions() {
      const r = await fetch('/api/finance/slug/action_queue');
      if (!r.ok) throw new Error(`actions ${r.status}`);
      const d = await r.json();
      this.actions = (d.rows || []).filter(a => a.source === 'exception');
    }
  });
</script>
</body>
</html>
