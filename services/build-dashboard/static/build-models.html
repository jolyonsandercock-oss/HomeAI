<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>Build · Models — Home AI</title>

<script src="/static/vendor/tailwind-3.4.min.js"></script>
<script defer src="/static/vendor/alpine-3.14.min.js"></script>
<script src="/static/_components/realm-toggle.js"></script>

<style>
  :root { color-scheme: dark; }
  body { background: linear-gradient(180deg, #0f172a 0%, #020617 100%); min-height: 100vh; color: #e2e8f0;
         font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  .glass { background: rgba(15,23,42,0.7); border: 1px solid rgba(148,163,184,0.15); }
  .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  .skel{background:linear-gradient(90deg,rgba(148,163,184,0.06) 0%,rgba(148,163,184,0.12) 50%,rgba(148,163,184,0.06) 100%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body x-data="buildModels()" x-init="boot()">

<header class="sticky top-0 z-40 backdrop-blur-md bg-slate-950/80 border-b border-white/5"
        x-data="homeaiHeader()" x-init="boot()">
  <div class="max-w-3xl mx-auto px-3 py-2 flex items-center gap-2">
    <a href="/" class="flex items-center gap-2 text-zinc-100 min-h-[44px]" aria-label="Home AI">
      <span class="text-xl leading-none">⌂</span>
      <span class="font-semibold text-sm">Home AI</span>
    </a>
    <div class="ml-2 flex bg-white/5 rounded-lg p-0.5 text-sm min-h-[44px] items-center" role="tablist" aria-label="Realm filter">
      <button type="button" role="tab" :aria-selected="realm === 'work'" :tabindex="realm === 'work' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-amber-400/60"
              :class="realm === 'work' ? 'bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('work')" @keydown.right.prevent="setRealm('all')" @keydown.left.prevent="setRealm('work')">Work</button>
      <button type="button" role="tab" :aria-selected="realm === 'all'" :tabindex="realm === 'all' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-emerald-400/60"
              :class="realm === 'all' ? 'bg-emerald-500/20 text-emerald-200 ring-1 ring-emerald-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('all')" @keydown.right.prevent="setRealm('all')" @keydown.left.prevent="setRealm('work')">All</button>
    </div>
    <nav class="ml-auto flex items-center gap-1 text-sm text-zinc-400" aria-label="Primary">
      <a href="/build/pipelines" class="px-2 min-h-[44px] flex items-center rounded-md text-zinc-100 bg-white/10">Build</a>
      <a href="/all" class="px-2 min-h-[44px] flex items-center rounded-md hover:text-zinc-100 hover:bg-white/5">All</a>
    </nav>
  </div>
</header>

<script>
  window.homeaiHeader = function () {
    return {
      realm: 'all',
      boot() {
        this.realm = (window.HomeAI && window.HomeAI.getRealm()) || 'all';
        window.addEventListener('realm-changed', (e) => { this.realm = e.detail.realm; });
      },
      setRealm(next) { if (window.HomeAI && window.HomeAI.setRealm) window.HomeAI.setRealm(next); }
    };
  };
</script>

<main class="max-w-3xl mx-auto p-3 space-y-3">

  <nav class="flex gap-1 text-sm" aria-label="Build sections">
    <a href="/build/pipelines" class="px-3 min-h-[44px] flex items-center rounded-md text-zinc-400 hover:text-zinc-200 hover:bg-white/5">Pipelines</a>
    <a href="/build/models" class="px-3 min-h-[44px] flex items-center rounded-md bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40">Models</a>
    <a href="/build/forensics" class="px-3 min-h-[44px] flex items-center rounded-md text-zinc-400 hover:text-zinc-200 hover:bg-white/5">Forensics</a>
    <span class="ml-auto mono text-xs text-slate-500 self-center" x-text="lastRefresh"></span>
  </nav>

  <h1 class="text-base font-semibold">Models · 30-day window</h1>

  <!-- Headline totals -->
  <section class="grid grid-cols-3 gap-2">
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-slate-500">Spend (est)</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading">
        <div class="text-2xl mono font-semibold mt-1">£<span x-text="totalCost.toFixed(2)"></span></div>
      </template>
    </div>
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-slate-500">Calls</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading">
        <div class="text-2xl mono font-semibold mt-1" x-text="totalCalls.toLocaleString('en-GB')"></div>
      </template>
    </div>
    <div class="glass rounded-lg p-3" :aria-busy="loading">
      <div class="text-xs uppercase tracking-wider text-slate-500">Tokens</div>
      <template x-if="loading"><div class="skel h-8 mt-2"></div></template>
      <template x-if="!loading">
        <div class="text-2xl mono font-semibold mt-1" x-text="fmtTokens(totalTokens)"></div>
      </template>
    </div>
  </section>

  <!-- Per-model table -->
  <section aria-label="Per-model breakdown">
    <h2 class="text-xs uppercase tracking-wider text-slate-500 px-1 mb-1">Per-model breakdown</h2>
    <template x-if="loading">
      <div class="space-y-2">
        <div class="glass rounded-lg p-3 h-12 skel"></div>
        <div class="glass rounded-lg p-3 h-12 skel"></div>
      </div>
    </template>
    <template x-if="!loading && rows.length === 0">
      <div class="glass rounded-lg p-4 text-center text-slate-400">No AI usage in the last 30 days.</div>
    </template>
    <template x-if="!loading && rows.length > 0">
      <div class="glass rounded-lg overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-xs uppercase tracking-wider text-slate-500">
            <tr>
              <th class="text-left px-3 py-2">Model</th>
              <th class="text-right px-3 py-2">Calls</th>
              <th class="text-right px-3 py-2">In tok</th>
              <th class="text-right px-3 py-2">Out tok</th>
              <th class="text-right px-3 py-2">Cost</th>
              <th class="text-right px-3 py-2 hidden sm:table-cell">Avg ms</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="r in rows" :key="r.model_used">
              <tr class="border-t border-white/5">
                <td class="px-3 py-2 mono text-zinc-100" x-text="r.model_used"></td>
                <td class="px-3 py-2 mono text-right" x-text="(r.calls || 0).toLocaleString('en-GB')"></td>
                <td class="px-3 py-2 mono text-right text-slate-400" x-text="fmtTokens(r.prompt_tokens)"></td>
                <td class="px-3 py-2 mono text-right text-slate-400" x-text="fmtTokens(r.completion_tokens)"></td>
                <td class="px-3 py-2 mono text-right">£<span x-text="(+r.est_cost_gbp || 0).toFixed(2)"></span></td>
                <td class="px-3 py-2 mono text-right text-slate-400 hidden sm:table-cell" x-text="r.avg_latency_ms ? r.avg_latency_ms.toLocaleString('en-GB') : '—'"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>
  </section>
</main>

<script>
  window.buildModels = () => ({
    loading: true,
    error: null,
    rows: [],
    lastRefresh: '',
    get totalCost() { return this.rows.reduce((s, r) => s + (+r.est_cost_gbp || 0), 0); },
    get totalCalls() { return this.rows.reduce((s, r) => s + (r.calls || 0), 0); },
    get totalTokens() { return this.rows.reduce((s, r) => s + (r.prompt_tokens || 0) + (r.completion_tokens || 0), 0); },
    fmtTokens(n) {
      n = +n || 0;
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
      return n.toLocaleString('en-GB');
    },
    async boot() {
      if (window.HomeAI && window.HomeAI.registerRealmHandshake) {
        window.HomeAI.registerRealmHandshake(async () => { await this.load(); });
      }
      await this.load();
    },
    async load() {
      this.loading = true;
      try {
        const r = await fetch('/api/finance/slug/build_model_spend_30d');
        if (!r.ok) throw new Error(`spend ${r.status}`);
        const d = await r.json();
        this.rows = d.rows || [];
        this.lastRefresh = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        this.error = e.message || String(e);
      } finally {
        this.loading = false;
      }
    }
  });
</script>
</body>
</html>
