<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>Build · Pipelines — Home AI</title>

<script src="/static/vendor/tailwind-3.4.min.js"></script>
<script defer src="/static/vendor/alpine-3.14.min.js"></script>
<script src="/static/_components/realm-toggle.js"></script>

<style>
  :root { color-scheme: dark; }
  body { background: linear-gradient(180deg, #0f172a 0%, #020617 100%); min-height: 100vh; color: #e2e8f0;
         font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  .glass { background: rgba(15,23,42,0.7); border: 1px solid rgba(148,163,184,0.15); }
  .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  .tl{display:inline-block;width:9px;height:9px;border-radius:999px;margin-right:6px;vertical-align:middle;box-shadow:0 0 6px currentColor}
  .tl-green{background:#10b981;color:#10b981}.tl-amber{background:#f59e0b;color:#f59e0b}
  .tl-red{background:#f43f5e;color:#f43f5e;animation:pulse 1.4s infinite}.tl-grey{background:#64748b;color:#64748b}
  @keyframes pulse{50%{opacity:0.55}}
  .skel{background:linear-gradient(90deg,rgba(148,163,184,0.06) 0%,rgba(148,163,184,0.12) 50%,rgba(148,163,184,0.06) 100%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body x-data="buildPipelines()" x-init="boot()">

<header class="sticky top-0 z-40 backdrop-blur-md bg-slate-950/80 border-b border-white/5"
        x-data="homeaiHeader()" x-init="boot()">
  <div class="max-w-3xl mx-auto px-3 py-2 flex items-center gap-2">
    <a href="/" class="flex items-center gap-2 text-zinc-100 min-h-[44px]" aria-label="Home AI">
      <span class="text-xl leading-none">⌂</span>
      <span class="font-semibold text-sm">Home AI</span>
    </a>
    <div class="ml-2 flex bg-white/5 rounded-lg p-0.5 text-sm min-h-[44px] items-center" role="tablist" aria-label="Realm filter">
      <button type="button" role="tab" :aria-selected="realm === 'work'" :tabindex="realm === 'work' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-amber-400/60"
              :class="realm === 'work' ? 'bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('work')" @keydown.right.prevent="setRealm('all')" @keydown.left.prevent="setRealm('work')">Work</button>
      <button type="button" role="tab" :aria-selected="realm === 'all'" :tabindex="realm === 'all' ? 0 : -1"
              class="px-3 min-h-[44px] min-w-[44px] rounded-md transition focus-visible:ring-2 focus-visible:ring-emerald-400/60"
              :class="realm === 'all' ? 'bg-emerald-500/20 text-emerald-200 ring-1 ring-emerald-500/40' : 'text-zinc-400 hover:text-zinc-200'"
              @click="setRealm('all')" @keydown.right.prevent="setRealm('all')" @keydown.left.prevent="setRealm('work')">All</button>
    </div>
    <nav class="ml-auto flex items-center gap-1 text-sm text-zinc-400" aria-label="Primary">
      <a href="/build/pipelines" class="px-2 min-h-[44px] flex items-center rounded-md text-zinc-100 bg-white/10">Build</a>
      <a href="/all" class="px-2 min-h-[44px] flex items-center rounded-md hover:text-zinc-100 hover:bg-white/5">All</a>
    </nav>
  </div>
</header>

<script>
  window.homeaiHeader = function () {
    return {
      realm: 'all',
      boot() {
        this.realm = (window.HomeAI && window.HomeAI.getRealm()) || 'all';
        window.addEventListener('realm-changed', (e) => { this.realm = e.detail.realm; });
      },
      setRealm(next) { if (window.HomeAI && window.HomeAI.setRealm) window.HomeAI.setRealm(next); }
    };
  };
</script>

<main class="max-w-3xl mx-auto p-3 space-y-3">

  <!-- Build sub-nav -->
  <nav class="flex gap-1 text-sm" aria-label="Build sections">
    <a href="/build/pipelines" class="px-3 min-h-[44px] flex items-center rounded-md bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40">Pipelines</a>
    <a href="/build/models" class="px-3 min-h-[44px] flex items-center rounded-md text-zinc-400 hover:text-zinc-200 hover:bg-white/5">Models</a>
    <a href="/build/forensics" class="px-3 min-h-[44px] flex items-center rounded-md text-zinc-400 hover:text-zinc-200 hover:bg-white/5">Forensics</a>
    <span class="ml-auto mono text-xs text-slate-500 self-center" x-text="lastRefresh"></span>
  </nav>

  <h1 class="text-base font-semibold">Pipelines</h1>

  <div x-show="error" x-cloak class="glass border-red-500/30 rounded-lg p-3" aria-live="assertive">
    <p class="text-red-300 text-sm font-medium">Couldn't load pipeline status.</p>
    <p class="text-zinc-400 text-xs mt-1" x-text="error"></p>
    <button class="mt-2 min-h-[44px] px-3 text-amber-300 underline text-sm" @click="boot()">Retry</button>
  </div>

  <section aria-label="AI providers">
    <h2 class="text-xs uppercase tracking-wider text-slate-500 px-1 mb-1">AI providers · 7d window</h2>

    <template x-if="loading">
      <div class="space-y-2">
        <div class="glass rounded-lg p-3 h-16 skel"></div>
        <div class="glass rounded-lg p-3 h-16 skel"></div>
      </div>
    </template>

    <template x-if="!loading && rows.length === 0">
      <div class="glass rounded-lg p-4 text-center text-slate-400">No AI calls in the last 7 days.</div>
    </template>

    <template x-if="!loading && rows.length > 0">
      <ul class="space-y-1.5" role="list">
        <template x-for="r in rows" :key="r.provider">
          <li class="glass rounded-lg p-3 flex items-center gap-3">
            <span class="tl shrink-0"
                  :class="{
                    'tl-green': r.status === 'live',
                    'tl-amber': r.status === 'recent' || r.status === 'stale',
                    'tl-red':   r.status === 'cold',
                    'tl-grey':  r.status === 'idle'
                  }"
                  :aria-label="`status ${r.status}`"></span>
            <div class="flex-1 min-w-0">
              <div class="mono text-sm text-zinc-100" x-text="r.provider"></div>
              <div class="text-xs text-slate-500 mt-0.5">
                <span x-text="r.status"></span> ·
                <span x-text="fmtAge(r.last_call_at)"></span>
              </div>
            </div>
            <div class="text-right shrink-0">
              <div class="mono text-sm text-zinc-200" x-text="r.calls_24h + ' · 24h'"></div>
              <div class="text-xs text-slate-500" x-text="r.calls_1h + ' · 1h'"></div>
            </div>
          </li>
        </template>
      </ul>
    </template>
  </section>
</main>

<script>
  window.buildPipelines = () => ({
    loading: true,
    error: null,
    rows: [],
    lastRefresh: '',
    fmtAge(iso) {
      if (!iso) return '—';
      const t = new Date(iso); const now = new Date();
      const m = Math.round((now - t) / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return m + 'm ago';
      const h = Math.round(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.round(h / 24) + 'd ago';
    },
    async boot() {
      if (window.HomeAI && window.HomeAI.registerRealmHandshake) {
        window.HomeAI.registerRealmHandshake(async () => { await this.load(); });
      }
      await this.load();
    },
    async load() {
      this.loading = true;
      this.error = null;
      try {
        const r = await fetch('/api/finance/slug/build_pipeline_status');
        if (!r.ok) throw new Error(`status ${r.status}`);
        const d = await r.json();
        this.rows = d.rows || [];
        this.lastRefresh = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        this.error = e.message || String(e);
      } finally {
        this.loading = false;
      }
    }
  });
</script>
</body>
</html>
