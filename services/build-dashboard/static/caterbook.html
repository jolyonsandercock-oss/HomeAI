<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caterbook — Home AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://unpkg.com/tabulator-tables@5.5.4/dist/css/tabulator.min.css" rel="stylesheet">
<link href="/static/css/tables.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.4/dist/js/tabulator.min.js"></script>
<script src="/static/js/homeai-table.js"></script>
<style>
  :root { color-scheme: dark; }
  body { background: radial-gradient(ellipse at top, #0f172a, #020617 60%); min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(148,163,184,0.15); }
  .mono { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; }
  .chip-arr { background: rgba(74,222,128,0.15);  color:#86efac; border:1px solid rgba(74,222,128,0.3); padding:1px 8px; border-radius:999px; font-size:0.7rem; }
  .chip-stay{ background: rgba(56,189,248,0.15);  color:#7dd3fc; border:1px solid rgba(56,189,248,0.3); padding:1px 8px; border-radius:999px; font-size:0.7rem; }
  .chip-dep { background: rgba(244,114,182,0.15); color:#f9a8d4; border:1px solid rgba(244,114,182,0.3); padding:1px 8px; border-radius:999px; font-size:0.7rem; }
</style>
</head>
<body class="text-slate-100">
<div x-data="cb()" x-init="boot()" class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

<header class="flex flex-wrap items-center justify-between gap-3">
  <div>
    <h1 class="text-2xl md:text-3xl font-semibold tracking-tight">Caterbook — Accommodation</h1>
    <p class="text-sm text-slate-400">Daily "Arrivals and Departures" PDF, ingested every 07:00.</p>
  </div>
  <div class="flex items-center gap-3 flex-wrap">
    <input type="text" data-homeai-search placeholder="search… (/)"
           class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm w-40"
           @input="searchAll($event.target.value)">
    <label class="text-xs text-slate-400">Window
      <select x-model.number="days" @change="reload()" class="ml-2 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm">
        <option value="7">7d</option><option value="30" selected>30d</option>
        <option value="90">90d</option><option value="180">6mo</option><option value="365">1y</option>
      </select>
    </label>
    <a href="/" class="text-xs text-slate-400 hover:text-slate-200">← Mission Control</a>
  </div>
</header>

<!-- Headline tiles -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-3">
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Days loaded</div>
    <div class="text-3xl font-medium mono" x-text="data.coverage?.days_loaded ?? '—'"></div>
    <div class="text-xs text-slate-400 mono" x-text="(data.coverage?.earliest||'') + ' → ' + (data.coverage?.latest||'')"></div>
  </div>
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Today — In-house</div>
    <div class="text-3xl font-medium mono" x-text="data.latest_snapshot?.in_house_count ?? '—'"></div>
    <div class="text-xs text-slate-400 mono" x-text="data.latest_snapshot?.revenue_in_house ? '£'+data.latest_snapshot.revenue_in_house : ''"></div>
  </div>
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Today — Arrivals</div>
    <div class="text-3xl font-medium mono" x-text="data.latest_snapshot?.arrivals_count ?? '—'"></div>
  </div>
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Today — Departures</div>
    <div class="text-3xl font-medium mono" x-text="data.latest_snapshot?.departures_count ?? '—'"></div>
  </div>
</section>

<!-- Today's three lists — keep card style for the at-a-glance view -->
<section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
  <template x-for="[label, key, cls] in [['Arrivals','arrivals','chip-arr'],['Stayovers','stayovers','chip-stay'],['Departures','departures','chip-dep']]" :key="key">
    <div class="glass rounded-xl p-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-base font-medium" x-text="label"></h2>
        <span :class="cls" x-text="(data.latest_snapshot?.[key] || []).length"></span>
      </div>
      <div class="space-y-1 max-h-72 overflow-y-auto">
        <template x-for="g in (data.latest_snapshot?.[key] || [])" :key="g.ref + g.room">
          <div class="text-sm flex justify-between gap-2 border-b border-slate-800/60 pb-1">
            <div class="truncate">
              <span class="mono text-xs text-slate-500" x-text="g.room"></span>
              <span x-text="g.guest"></span>
              <div class="text-xs text-slate-500" x-text="(g.type||'') + ' · ' + (g.guests||'')"></div>
            </div>
            <div class="text-right">
              <div class="mono" x-text="'£' + (g.balance ?? '—')"></div>
              <div class="text-xs text-slate-500" x-text="g.dep ? '→ ' + g.dep : ''"></div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>
</section>

<!-- Per-room revenue, daily snapshots, recent imports → Tabulator -->
<section class="glass rounded-xl p-3 md:p-4">
  <h2 class="text-lg font-medium mb-2 px-1">Revenue per room (window)</h2>
  <div id="per-room-table"></div>
</section>

<section class="glass rounded-xl p-3 md:p-4">
  <h2 class="text-lg font-medium mb-2 px-1">Daily snapshots</h2>
  <div id="per-day-table"></div>
</section>

<section class="glass rounded-xl p-3 md:p-4">
  <h2 class="text-lg font-medium mb-2 px-1">Recent imports (click row → source email)</h2>
  <div id="imports-table"></div>
</section>

</div>

<script>
function cb() {
  return {
    days: 30,
    data: { coverage: null, latest_snapshot: null, per_day: [], per_room: [], recent_imports: [] },
    tables: {},
    async boot() { await this.reload(); },
    async reload() {
      const r = await fetch(`/api/caterbook/overview?days=${this.days}`);
      this.data = await r.json();
      this.render();
    },
    render() {
      Object.values(this.tables).forEach(t => t.destroy());

      this.tables.perRoom = homeai_table('#per-room-table', this.data.per_room, {
        persistenceID: 'caterbook-per-room',
        columns: [
          { title: 'Room',     field: 'room', formatter: 'mono', width: 100 },
          { title: 'Nights',   field: 'nights', hozAlign: 'right', headerFilter: false },
          { title: 'Revenue',  field: 'revenue', formatter: 'money', hozAlign: 'right', headerFilter: false },
          { title: 'Avg/night',field: 'avg_rate', formatter: 'money', hozAlign: 'right', headerFilter: false },
        ],
      });

      this.tables.perDay = homeai_table('#per-day-table', this.data.per_day, {
        persistenceID: 'caterbook-per-day',
        columns: [
          { title: 'Date',       field: 'report_date', formatter: 'date', width: 110 },
          { title: 'Arrivals',   field: 'arrivals_count',   hozAlign: 'right', headerFilter: false },
          { title: 'Stayovers',  field: 'stayovers_count',  hozAlign: 'right', headerFilter: false },
          { title: 'Departures', field: 'departures_count', hozAlign: 'right', headerFilter: false },
          { title: 'In-house',   field: 'in_house_count',   hozAlign: 'right', headerFilter: false },
          { title: 'Revenue',    field: 'revenue_in_house', formatter: 'money', hozAlign: 'right', headerFilter: false },
        ],
      });

      this.tables.imports = homeai_table('#imports-table', this.data.recent_imports, {
        persistenceID: 'caterbook-imports',
        columns: [
          { title: 'Received',  field: 'received_at', formatter: 'datetime', width: 160 },
          { title: 'Report date',field:'report_date', formatter: 'date', width: 110 },
          { title: 'Account',   field: 'account', formatter: 'mono', width: 90 },
          { title: 'Arrivals',  field: 'arrivals_count',  hozAlign: 'right', headerFilter: false, width: 90 },
          { title: 'Stayovers', field: 'stayovers_count', hozAlign: 'right', headerFilter: false, width: 90 },
          { title: 'Departures',field: 'departures_count',hozAlign: 'right', headerFilter: false, width: 90 },
          { title: 'Email ID',  field: 'source_email_id', formatter: 'mono' },
        ],
        row_link: (row) => `/viewer/email/${encodeURIComponent(row.account)}/${encodeURIComponent(row.source_email_id)}`,
      });
    },
    searchAll(v) {
      v = (v || '').trim();
      Object.values(this.tables).forEach(t => {
        if (!v) { t.clearFilter(true); return; }
        t.setFilter([(d) => Object.values(d).some(val => val != null && String(val).toLowerCase().includes(v.toLowerCase()))]);
      });
    },
  };
}
</script>
</body></html>
