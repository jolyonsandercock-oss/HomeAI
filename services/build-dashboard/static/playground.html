<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classifier Playground</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root { color-scheme: dark; }
  body { background: radial-gradient(ellipse at top, #0f172a, #020617 60%); min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
  .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(148,163,184,0.15); }
  textarea, input, select { background: rgba(2,6,23,0.6); border: 1px solid rgba(148,163,184,0.2); color: #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; width: 100%; font-family: inherit; }
  textarea:focus, input:focus, select:focus { outline: none; border-color: rgba(56,189,248,0.6); }
  textarea { font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace; font-size: 0.85rem; }
  pre { white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, monospace; font-size: 0.8rem; }
  .cat-invoice            { background: rgba(248,113,113,0.18); color: #f87171; }
  .cat-action-required    { background: rgba(251,191,36,0.18); color: #fbbf24; }
  .cat-report-attachment  { background: rgba(96,165,250,0.18); color: #60a5fa; }
  .cat-school-medical     { background: rgba(192,132,252,0.18); color: #c084fc; }
  .cat-property           { background: rgba(74,222,128,0.18); color: #4ade80; }
  .cat-pub                { background: rgba(56,189,248,0.18); color: #38bdf8; }
  .cat-fyi                { background: rgba(148,163,184,0.18); color: #cbd5e1; }
  .cat-junk               { background: rgba(100,116,139,0.18); color: #94a3b8; }
  .arrow { font-size: 1.6rem; color: #fbbf24; }
</style>
</head>
<body class="text-slate-100">

<div x-data="playground()" class="max-w-7xl mx-auto p-4 md:p-6 space-y-5">

  <header>
    <div class="text-xs tracking-widest text-slate-400 uppercase">Home AI</div>
    <h1 class="text-2xl md:text-3xl font-semibold">Email Classifier Playground</h1>
    <p class="text-sm text-slate-400 mt-1">Paste an email, click classify, see exactly what the live qwen2.5:7b prompt + INVOICE_HEURISTIC_v1 gate would do. No DB writes. Use this to iterate on the classifier when something looks miscategorised.</p>
  </header>

  <div class="grid md:grid-cols-2 gap-4">
    <!-- Input -->
    <div class="glass rounded-2xl p-4 space-y-3">
      <div class="text-xs uppercase tracking-wider text-slate-400">Input</div>
      <div>
        <label class="text-xs text-slate-400">From</label>
        <input type="text" x-model="input.from_address" placeholder="sender@example.com">
      </div>
      <div>
        <label class="text-xs text-slate-400">Subject</label>
        <input type="text" x-model="input.subject" placeholder="Payment Declined for 202-...">
      </div>
      <div>
        <label class="text-xs text-slate-400">Body</label>
        <textarea x-model="input.body" rows="10" placeholder="Body text the classifier sees..."></textarea>
      </div>
      <div class="flex gap-2 items-center">
        <select x-model="input.model" class="flex-1">
          <option value="qwen2.5:7b">qwen2.5:7b (hot tier — production)</option>
          <option value="qwen2.5:14b">qwen2.5:14b (heavier)</option>
          <option value="phi4:14b">phi4:14b</option>
        </select>
        <button @click="classify()" :disabled="busy"
                class="px-4 py-2 rounded bg-sky-700 hover:bg-sky-600 disabled:opacity-40">
          <span x-show="!busy">Classify</span>
          <span x-show="busy" class="inline-flex items-center gap-2">
            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"/>
              <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>thinking…
          </span>
        </button>
      </div>
      <div class="flex flex-wrap gap-1 text-xs pt-2 border-t border-slate-700/30">
        <span class="text-slate-500 mr-1">presets:</span>
        <template x-for="p in presets" :key="p.label">
          <button @click="loadPreset(p)" class="px-2 py-0.5 rounded bg-slate-800 hover:bg-slate-700" x-text="p.label"></button>
        </template>
      </div>
    </div>

    <!-- Verdict -->
    <div class="glass rounded-2xl p-4 space-y-3">
      <div class="text-xs uppercase tracking-wider text-slate-400">Verdict</div>
      <template x-if="!result && !error">
        <div class="text-sm text-slate-500 italic">No classification yet.</div>
      </template>
      <template x-if="error">
        <div class="text-sm text-rose-400">Error: <span x-text="error"></span></div>
      </template>
      <template x-if="result">
        <div class="space-y-3">
          <!-- Decision flow -->
          <div class="flex items-center gap-3 flex-wrap">
            <div class="text-center">
              <div class="text-[10px] uppercase tracking-wider text-slate-500">model</div>
              <div class="mt-1 px-3 py-1.5 rounded inline-block" :class="catClass(result.verdict.category_from_model)" x-text="result.verdict.category_from_model"></div>
            </div>
            <div class="arrow" x-show="result.verdict.category_from_model !== result.verdict.final_category">→</div>
            <div class="text-center" x-show="result.verdict.category_from_model !== result.verdict.final_category">
              <div class="text-[10px] uppercase tracking-wider text-slate-500">heuristic</div>
              <div class="mt-1 px-3 py-1.5 rounded inline-block" :class="catClass(result.verdict.final_category)" x-text="result.verdict.final_category"></div>
            </div>
            <div class="ml-auto text-right">
              <div class="text-[10px] uppercase tracking-wider text-slate-500">confidence</div>
              <div class="text-2xl font-medium" x-text="(result.verdict.confidence * 100).toFixed(0) + '%'"></div>
            </div>
          </div>

          <div x-show="result.verdict.heuristic_note" class="text-xs px-2 py-1.5 rounded bg-amber-900/20 border border-amber-700/40 text-amber-300">
            <span x-text="result.verdict.heuristic_note"></span>
          </div>

          <div class="grid grid-cols-2 gap-2 text-sm">
            <div class="bg-slate-900/60 rounded p-2"><span class="text-slate-400 text-xs">Entity ID</span><div x-text="result.verdict.entity_id"></div></div>
            <div class="bg-slate-900/60 rounded p-2"><span class="text-slate-400 text-xs">Ollama duration</span><div x-text="result.ollama.duration_ms + 'ms'"></div></div>
          </div>

          <div>
            <div class="text-xs text-slate-400 mb-1">Model summary</div>
            <div class="bg-slate-900/60 rounded p-2 text-sm" x-text="result.verdict.summary || '—'"></div>
          </div>

          <div>
            <div class="text-xs text-slate-400 mb-1">Raw model output</div>
            <pre class="bg-slate-900/60 rounded p-2 text-slate-300" x-text="result.ollama.raw_response || result.ollama.raw_error"></pre>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<script>
function playground() {
  return {
    input: { from_address: '', subject: '', body: '', model: 'qwen2.5:7b' },
    busy: false,
    result: null,
    error: null,
    presets: [
      { label: 'Amazon payment declined', input: {
          from_address: 'no-reply@amazon.co.uk',
          subject: 'Payment Declined for 202-0557688-8176333',
          body: 'Your card payment was declined. Order: 202-0557688-8176333. Total: £24.99. Please update your payment information to avoid order cancellation.' } },
      { label: 'Real invoice', input: {
          from_address: 'accounts@quaffle-wines.example.com',
          subject: 'Invoice INV-2026-014 — Quaffle Wines',
          body: 'Hi Jo, Please find your monthly wine order invoice INV-2026-014. Amount due £1,247.83. VAT 20% included (£207.97). Due date: 30/05/2026. Please pay by BACS to Sort 12-34-56 Acc 12345678.' } },
      { label: 'Stripe receipt', input: {
          from_address: 'receipts@stripe.com',
          subject: 'Receipt for your payment to Caterbook',
          body: 'Thanks for your payment of £49.00 to Caterbook on 2026-05-09. Receipt number: ch_3QbX...' } },
      { label: 'School medical', input: {
          from_address: 'head@stmaryskindergarten.example.com',
          subject: 'Asthma inhaler reminder for Charlotte',
          body: "Dear Mrs Sandercock, A reminder that Charlotte's blue inhaler is running low. Please send a replacement when convenient." } },
      { label: 'Junk', input: {
          from_address: 'prince.bankole@gov.example.ng',
          subject: 'Urgent business proposal — $1,000,000',
          body: 'My dear friend, I am Prince Bankole and I have inherited $1,000,000...' } },
    ],

    async classify() {
      this.busy = true; this.error = null; this.result = null;
      try {
        const r = await fetch('/api/playground/classify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.input),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || r.statusText);
        this.result = data;
      } catch (e) {
        this.error = e.message;
      } finally { this.busy = false; }
    },

    loadPreset(p) {
      this.input = { ...this.input, ...p.input };
      this.result = null; this.error = null;
    },

    catClass(c) { return c ? 'cat-' + c : ''; },
  };
}
</script>
</body>
</html>
