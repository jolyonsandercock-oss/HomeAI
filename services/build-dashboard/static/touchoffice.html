<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TouchOffice — Home AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://unpkg.com/tabulator-tables@5.5.4/dist/css/tabulator.min.css" rel="stylesheet">
<link href="/static/css/tables.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.4/dist/js/tabulator.min.js"></script>
<script src="/static/js/homeai-table.js"></script>
<style>
  :root { color-scheme: dark; }
  body { background: radial-gradient(ellipse at top, #0f172a, #020617 60%); min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(148,163,184,0.15); }
  .mono { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; }
  .pill-malthouse { background: rgba(96,165,250,0.15); color: #93c5fd; border: 1px solid rgba(96,165,250,0.3); padding: 1px 8px; border-radius: 999px; font-size: 0.7rem; }
  .pill-sandwich  { background: rgba(74,222,128,0.15); color: #86efac; border: 1px solid rgba(74,222,128,0.3); padding: 1px 8px; border-radius: 999px; font-size: 0.7rem; }
</style>
</head>
<body class="text-slate-100">
<div x-data="to()" x-init="boot()" class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

<header class="flex flex-wrap items-center justify-between gap-3">
  <div>
    <h1 class="text-2xl md:text-3xl font-semibold tracking-tight">TouchOffice — Scraped Data</h1>
    <p class="text-sm text-slate-400">Browser-scraped EPoS for Malthouse + Sandwich Bar. Daily 03:00.</p>
  </div>
  <div class="flex items-center gap-3 flex-wrap">
    <input type="text" data-homeai-search placeholder="search… (/)"
           class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm w-40"
           @input="searchAll($event.target.value)">
    <label class="text-xs text-slate-400">Window
      <select x-model.number="days" @change="reload()" class="ml-2 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm">
        <option value="7">7d</option><option value="30" selected>30d</option>
        <option value="90">90d</option><option value="365">1y</option><option value="1095">3y</option>
      </select>
    </label>
    <a href="/" class="text-xs text-slate-400 hover:text-slate-200">← Mission Control</a>
  </div>
</header>

<section class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <template x-for="c in data.coverage" :key="c.site">
    <div class="glass rounded-xl p-5">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-medium" x-text="c.site === 'malthouse' ? 'Malthouse (pub)' : 'Sandwich Bar (ice cream)'"></h2>
        <span :class="c.site === 'malthouse' ? 'pill-malthouse' : 'pill-sandwich'" x-text="c.site"></span>
      </div>
      <div class="mt-3 grid grid-cols-3 gap-3 text-sm">
        <div><div class="text-slate-400 text-xs">days loaded</div><div class="mono text-xl font-medium" x-text="c.days_loaded"></div></div>
        <div><div class="text-slate-400 text-xs">earliest</div><div class="mono text-sm" x-text="c.earliest"></div></div>
        <div><div class="text-slate-400 text-xs">latest</div><div class="mono text-sm" x-text="c.latest"></div></div>
      </div>
    </div>
  </template>
</section>

<section class="glass rounded-xl p-3 md:p-4">
  <h2 class="text-lg font-medium mb-2 px-1">Per day</h2>
  <div id="per-day-table"></div>
</section>

<section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
  <div class="glass rounded-xl p-3 md:p-4">
    <h2 class="text-lg font-medium mb-2 px-1">Top departments</h2>
    <div id="depts-table"></div>
  </div>
  <div class="glass rounded-xl p-3 md:p-4">
    <h2 class="text-lg font-medium mb-2 px-1">Top PLUs</h2>
    <div id="plus-table"></div>
  </div>
</section>

<section class="glass rounded-xl p-3 md:p-4">
  <h2 class="text-lg font-medium mb-2 px-1">Recent scrape attempts (click row → snapshot)</h2>
  <div id="scrapes-table"></div>
</section>

</div>

<script>
function to() {
  return {
    days: 30,
    data: { coverage: [], per_day: [], top_departments: [], top_plus: [], recent_scrapes: [] },
    tables: {},
    async boot() { await this.reload(); },
    async reload() {
      const r = await fetch(`/api/touchoffice/overview?days=${this.days}`);
      this.data = await r.json();
      this.render();
    },
    render() {
      const sitePill = (cell) => {
        const v = cell.getValue();
        const cls = v === 'malthouse' ? 'pill-malthouse' : 'pill-sandwich';
        return `<span class="${cls}">${v}</span>`;
      };
      Object.values(this.tables).forEach(t => t.destroy());

      this.tables.perDay = homeai_table('#per-day-table', this.data.per_day, {
        persistenceID: 'touchoffice-per-day',
        columns: [
          { title: 'Date',  field: 'report_date', formatter: 'date',  width: 110 },
          { title: 'Site',  field: 'site', formatter: sitePill, width: 110 },
          { title: 'NET',   field: 'net_sales',   formatter: 'money', hozAlign: 'right', headerFilter: false },
          { title: 'GROSS', field: 'gross_sales', formatter: 'money', hozAlign: 'right', headerFilter: false },
          { title: 'Covers',field: 'covers',      hozAlign: 'right',  headerFilter: false },
          { title: 'Depts', field: 'depts',       hozAlign: 'right',  headerFilter: false },
          { title: 'PLUs',  field: 'plus',        hozAlign: 'right',  headerFilter: false },
        ],
      });

      this.tables.depts = homeai_table('#depts-table', this.data.top_departments, {
        persistenceID: 'touchoffice-depts',
        columns: [
          { title: 'Site', field: 'site', formatter: sitePill, width: 110 },
          { title: 'Department', field: 'department', widthGrow: 2 },
          { title: 'Qty',   field: 'qty',   hozAlign: 'right', headerFilter: false },
          { title: 'Total', field: 'total', formatter: 'money', hozAlign: 'right', headerFilter: false },
        ],
      });

      this.tables.plus = homeai_table('#plus-table', this.data.top_plus, {
        persistenceID: 'touchoffice-plus',
        columns: [
          { title: 'Site', field: 'site', formatter: sitePill, width: 110 },
          { title: 'PLU', field: 'plu_number', formatter: 'mono', width: 80 },
          { title: 'Descriptor', field: 'descriptor', widthGrow: 2 },
          { title: 'Qty',   field: 'qty',   hozAlign: 'right', headerFilter: false },
          { title: 'Total', field: 'total', formatter: 'money', hozAlign: 'right', headerFilter: false },
        ],
      });

      this.tables.scrapes = homeai_table('#scrapes-table', this.data.recent_scrapes, {
        persistenceID: 'touchoffice-scrapes',
        columns: [
          { title: 'When',   field: 'scraped_at',   formatter: 'datetime', width: 160 },
          { title: 'Site',   field: 'site', formatter: sitePill, width: 110 },
          { title: 'Date',   field: 'report_date',  formatter: 'date', width: 110 },
          { title: 'Widget', field: 'widget' },
          { title: 'OK',     field: 'success',
            formatter: (c) => c.getValue() ? '<span class="cell-badge badge-ok">✓</span>' : '<span class="cell-badge badge-fail">✗</span>',
            hozAlign: 'center', headerFilter: false, width: 70 },
          { title: 'Rows',   field: 'rows_written', hozAlign: 'right', headerFilter: false, width: 70 },
          { title: 'Error',  field: 'error_message', formatter: (c)=>{const v=c.getValue();return v? `<span class="text-rose-300 text-xs">${v.slice(0,80)}</span>`:''} },
        ],
        row_link: (row) => {
          const html = row.snapshot_html_path;
          if (!html) return null;
          const fn = html.split('/').pop();
          return `/viewer/snapshot/${encodeURIComponent(fn)}`;
        },
      });
    },
    searchAll(v) {
      v = (v || '').trim();
      Object.values(this.tables).forEach(t => {
        if (!v) { t.clearFilter(true); return; }
        t.setFilter([(d) => Object.values(d).some(val => val != null && String(val).toLowerCase().includes(v.toLowerCase()))]);
      });
    },
  };
}
</script>
</body></html>
