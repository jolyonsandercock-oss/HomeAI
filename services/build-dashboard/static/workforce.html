<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workforce — Home AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://unpkg.com/tabulator-tables@5.5.4/dist/css/tabulator.min.css" rel="stylesheet">
<link href="/static/css/tables.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.4/dist/js/tabulator.min.js"></script>
<script src="/static/js/homeai-table.js"></script>
<style>
  :root { color-scheme: dark; }
  body { background: radial-gradient(ellipse at top, #0f172a, #020617 60%); min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(148,163,184,0.15); }
  .mono { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; }
</style>
</head>
<body class="text-slate-100">
<div x-data="wf()" x-init="boot()" class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

<header class="flex flex-wrap items-center justify-between gap-3">
  <div>
    <h1 class="text-2xl md:text-3xl font-semibold tracking-tight">Workforce — Labour</h1>
    <p class="text-sm text-slate-400">Tanda (my.workforce.com). Daily sync 02:15.</p>
  </div>
  <div class="flex items-center gap-3 flex-wrap">
    <input type="text" data-homeai-search placeholder="search… (/)"
           class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm w-40"
           @input="searchAll($event.target.value)">
    <label class="text-xs text-slate-400">Window
      <select x-model.number="days" @change="reload()" class="ml-2 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm">
        <option value="7">7d</option><option value="30" selected>30d</option>
        <option value="90">90d</option><option value="365">1y</option>
      </select>
    </label>
    <a href="/" class="text-xs text-slate-400 hover:text-slate-200">← Mission Control</a>
  </div>
</header>

<section class="grid grid-cols-2 md:grid-cols-4 gap-3">
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Shifts loaded</div>
    <div class="text-3xl font-medium mono" x-text="data.coverage?.shifts ?? '—'"></div>
    <div class="text-xs text-slate-400 mono" x-text="(data.coverage?.earliest||'') + ' → ' + (data.coverage?.latest||'')"></div>
  </div>
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Staff</div>
    <div class="text-3xl font-medium mono" x-text="data.coverage?.staff ?? '—'"></div>
  </div>
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Total hours</div>
    <div class="text-3xl font-medium mono" x-text="data.coverage?.total_hours ?? '—'"></div>
  </div>
  <div class="glass rounded-xl p-4">
    <div class="text-xs uppercase tracking-wide text-slate-400">Window hours</div>
    <div class="text-3xl font-medium mono" x-text="windowHours()"></div>
  </div>
</section>

<section class="glass rounded-xl p-3 md:p-4">
  <h2 class="text-lg font-medium mb-2 px-1">Per day</h2>
  <div id="per-day-table"></div>
</section>

<section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
  <div class="glass rounded-xl p-3 md:p-4">
    <h2 class="text-lg font-medium mb-2 px-1">By department</h2>
    <div id="dept-table"></div>
  </div>
  <div class="glass rounded-xl p-3 md:p-4">
    <h2 class="text-lg font-medium mb-2 px-1">Top staff (click → my.workforce.com)</h2>
    <div id="staff-table"></div>
  </div>
</section>

<section class="glass rounded-xl p-3 md:p-4">
  <h2 class="text-lg font-medium mb-2 px-1">Recent sync</h2>
  <div id="sync-table"></div>
</section>

</div>

<script>
function wf() {
  return {
    days: 30,
    data: { coverage:{}, per_day:[], per_dept:[], top_staff:[], recent_sync:[] },
    tables: {},
    async boot() { await this.reload(); },
    async reload() {
      const r = await fetch(`/api/workforce/overview?days=${this.days}`);
      this.data = await r.json();
      this.render();
    },
    windowHours() {
      return (this.data.per_day || []).reduce((s,d)=>s+(parseFloat(d.hours)||0), 0).toFixed(1);
    },
    render() {
      Object.values(this.tables).forEach(t => t.destroy());

      this.tables.perDay = homeai_table('#per-day-table', this.data.per_day, {
        persistenceID: 'workforce-per-day',
        columns: [
          { title: 'Date',   field: 'shift_date', formatter: 'date', width: 110 },
          { title: 'Shifts', field: 'shifts', hozAlign: 'right', headerFilter: false },
          { title: 'Staff',  field: 'staff',  hozAlign: 'right', headerFilter: false },
          { title: 'Hours',  field: 'hours',  hozAlign: 'right', headerFilter: false },
        ],
      });

      this.tables.dept = homeai_table('#dept-table', this.data.per_dept, {
        persistenceID: 'workforce-dept',
        columns: [
          { title: 'Dept',   field: 'dept', formatter: 'mono' },
          { title: 'Shifts', field: 'shifts', hozAlign: 'right', headerFilter: false },
          { title: 'Staff',  field: 'staff',  hozAlign: 'right', headerFilter: false },
          { title: 'Hours',  field: 'hours',  hozAlign: 'right', headerFilter: false },
        ],
      });

      this.tables.staff = homeai_table('#staff-table', this.data.top_staff, {
        persistenceID: 'workforce-staff',
        columns: [
          { title: 'Name', field: 'full_name', formatter: (c) => c.getValue() || ('uid '+c.getRow().getData().user_external_id) },
          { title: 'Shifts', field: 'shifts', hozAlign: 'right', headerFilter: false },
          { title: 'Hours',  field: 'hours',  hozAlign: 'right', headerFilter: false },
        ],
        row_link: (row) => row.user_external_id
          ? `https://my.workforce.com/users/${row.user_external_id}`
          : null,
      });

      this.tables.sync = homeai_table('#sync-table', this.data.recent_sync, {
        persistenceID: 'workforce-sync',
        columns: [
          { title: 'When',     field: 'started_at', formatter: 'datetime', width: 160 },
          { title: 'Endpoint', field: 'endpoint', formatter: 'mono' },
          { title: 'HTTP',     field: 'http_status',
            formatter: (c) => {
              const v = c.getValue();
              return `<span class="cell-badge ${v === 200 ? 'badge-ok' : 'badge-fail'}">${v}</span>`;
            }, hozAlign: 'center', headerFilter: false, width: 80 },
          { title: 'Seen',     field: 'records_seen', hozAlign: 'right', headerFilter: false, width: 70 },
          { title: 'Ins/Upd',  field: 'records_inserted',
            formatter: (c) => `${c.getValue()||0}/${c.getRow().getData().records_updated||0}`,
            hozAlign: 'right', headerFilter: false, width: 90 },
          { title: 'ms',       field: 'runtime_ms', hozAlign: 'right', headerFilter: false, width: 70 },
          { title: 'Error',    field: 'error_message',
            formatter: (c) => { const v = c.getValue(); return v ? `<span class="text-rose-300 text-xs">${v.slice(0,100)}</span>` : ''; } },
        ],
      });
    },
    searchAll(v) {
      v = (v || '').trim();
      Object.values(this.tables).forEach(t => {
        if (!v) { t.clearFilter(true); return; }
        t.setFilter([(d) => Object.values(d).some(val => val != null && String(val).toLowerCase().includes(v.toLowerCase()))]);
      });
    },
  };
}
</script>
</body></html>
