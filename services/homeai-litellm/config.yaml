# LiteLLM proxy config — capability-tag routing
# ===============================================================
# Workflows hit /v1/chat/completions with model="cap_*" — LiteLLM
# dispatches to the right Anthropic model. Presidio redaction is
# enforced via a pre-call callback (registered in proxy_config.py).
#
# Pair-HA: a sibling homeai-litellm-secondary mirrors this config.
# Caddy fronts both with active-passive failover.

model_list:
  # ---- Capability tags ----
  - model_name: cap_invoice_extract
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 1024

  - model_name: cap_email_classify
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 512

  - model_name: cap_report_classify
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 512

  - model_name: cap_child_classify
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 512

  - model_name: cap_daily_digest
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 2048

  - model_name: cap_dreaming
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 2048

  - model_name: cap_compliance
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 1024

  - model_name: cap_cashflow
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 2048

  # ---- Pass-through for any caller that still names a model directly ----
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 1024

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 2048

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 1024

  # ---- DeepSeek (TD-007) — Hermes egress via this gateway instead of a ----
  # ---- direct api.deepseek.com call, so it gets Presidio + ai_usage. -----
  # Wire model matches ~/.hermes/config.yaml's fallback_providers deepseek
  # entry (deepseek-v4-pro is a first-class DeepSeek V4 model ID, not an
  # alias — see hermes-agent/plugins/model-providers/deepseek/__init__.py).
  - model_name: deepseek-v4-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_base: https://api.deepseek.com/v1
      api_key: os.environ/DEEPSEEK_API_KEY
      max_tokens: 4096

  # ---- Local multimodal (W7800/ROCm via Ollama) — added 2026-06-19 ----
  # Gemma 4 QAT 31B, Unsloth dynamic UD-Q4_K_XL. Local = no secret/api_key.
  # NOTE: the global presidio_gate callback still applies to this entry; for
  # local vision extraction redaction is counterproductive — scope it out
  # during pipeline integration (left to operator, not changed here).
  - model_name: gemma4-qat31b
    litellm_params:
      model: ollama_chat/gemma4-qat31b
      api_base: http://homeai-ollama:11434
      max_tokens: 2048

# Logging + telemetry
litellm_settings:
  # Drop telemetry to LiteLLM's own external endpoint; we log to ai_usage
  telemetry: false
  set_verbose: false
  drop_params: true
  # Pre/post hooks — see proxy_config.py. Path must resolve to an INSTANCE,
  # not a class (LiteLLM uses pyimport(module.attr), not class instantiation).
  # NOTE (found 2026-07-03 while verifying TD-007): ai_usage_logger_instance
  # was defined in proxy_config.py but never listed here, so NO route
  # (including the pre-existing Anthropic ones) was writing to ai_usage.
  # Fixed by making this a list.
  callbacks:
    - proxy_config.presidio_gate_instance
    - proxy_config.ai_usage_logger_instance

# General proxy settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Workers can hit /v1/chat/completions without a key when on the
  # internal network. External access is via Caddy with bearer-token auth.
  # database_url: os.environ/LITELLM_DATABASE_URL    # enable for budget mgmt in U144 v2
